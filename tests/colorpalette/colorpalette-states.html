<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">

    <link rel="stylesheet" data-role="kendo-theme" href="/packages/default/dist/all.css">

</head>

                <table class="k-colorpalette-table" role="presentation">
                    <tbody>
                        <tr role="row">
                            <td id="k-colorpalette-tile-black" role="gridcell" aria-label="black" class="k-colorpalette-tile k-focus" style="background-color: black;"></td>

                            <td id="k-colorpalette-tile-blue" role="gridcell" aria-label="blue" class="k-colorpalette-tile" style="background-color: blue;"></td>

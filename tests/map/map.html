<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <style>
        .k-map .k-layer:last-child {
            background-color: var(--kendo-color-surface);
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
        }

    </style>
    <div id="test-area">
        <div class="k-map" style="position: relative;">
            <div class="km-scroll-wrapper" style="overflow: hidden;">
                <div class="km-scroll-header"></div>
                <div class="km-scroll-container" style="transform-origin: left top 0px;">
                    <div class="k-layer" style="z-index: 1000;">
                        <span class="k-marker k-icon k-svg-icon k-icon-xxl k-svg-i-map-marker-target" aria-hidden="true" style="z-index: 1000; left: 500px; top: 300px;">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M12 6.769a3.206 3.206 0 1 0 3.206 3.206A3.206 3.206 0 0 0 12 6.769m0 5.4a2.194 2.194 0 1 1 2.194-2.194A2.194 2.194 0 0 1 12 12.169m0-9.45a7.265 7.265 0 0 0-7.256 7.256c0 2.608 1.21 5.378 3.499 8.011a21.3 21.3 0 0 0 3.467 3.206.51.51 0 0 0 .581 0 21.3 21.3 0 0 0 3.467-3.206c2.289-2.633 3.499-5.4 3.499-8.011a7.265 7.265 0 0 0-7.256-7.256zm0 17.424c-1.266-.977-6.244-5.138-6.244-10.168a6.244 6.244 0 0 1 12.488 0c0 5.03-4.978 9.191-6.244 10.168"></path>
                            </svg>
                        </span>
                    </div>
                    <div class="k-layer"></div>
                </div>
                <div class="km-touch-scrollbar km-horizontal-scrollbar" style="transform-origin: left top 0px; width: 24px;"></div>
                <div class="km-touch-scrollbar km-vertical-scrollbar" style="transform-origin: left top 0px; height: 239px;"></div>
            </div>
            <div class="k-map-controls k-bottom-end">
                <div class="k-attribution">© <a href="#">Attribution</a>
                </div>
            </div>
            <div class="k-map-controls k-top-start">
                <div class="k-navigator">
                    <button class="k-navigator-n k-button k-button-flat k-rounded-full k-icon-button" aria-label="Pan north">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-up" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M19.108 15.058a.506.506 0 0 1-.715 0l-6.392-6.391-6.392 6.391a.506.506 0 0 1-.716-.716l6.75-6.75a.506.506 0 0 1 .716 0l6.75 6.75a.506.506 0 0 1 0 .716z"></path>
                            </svg>
                        </span>
                    </button>
                    <button class="k-navigator-e k-button k-button-flat k-rounded-full k-icon-button" aria-label="Pan east">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-right" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="m16.408 12.358-6.75 6.75a.506.506 0 0 1-.716-.715l6.391-6.392-6.391-6.392a.506.506 0 0 1 .715-.716l6.75 6.75a.506.506 0 0 1 0 .716z"></path>
                            </svg>
                        </span>
                    </button>
                    <button class="k-navigator-s k-button k-button-flat k-rounded-full k-icon-button" aria-label="Pan south">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-down" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="m19.108 9.658-6.75 6.75a.506.506 0 0 1-.716 0l-6.75-6.75a.506.506 0 0 1 .716-.716L12 15.333l6.392-6.391a.506.506 0 0 1 .715.715z"></path>
                            </svg>
                        </span>
                    </button>
                    <button class="k-navigator-w k-button k-button-flat k-rounded-full k-icon-button" aria-label="Pan west">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-left" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M15.058 18.392a.506.506 0 1 1-.716.715l-6.75-6.75a.506.506 0 0 1 0-.716l6.75-6.75a.506.506 0 0 1 .716.716l-6.391 6.392z"></path>
                            </svg>
                        </span>
                    </button>
                </div>
                <div role="group" class="k-group-horizontal k-zoom-control k-button-group">
                    <button class="k-zoom-in k-button k-icon-button" aria-label="Zoom in">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-plus" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M19.931 12a.506.506 0 0 1-.506.506h-6.919v6.919a.507.507 0 0 1-1.013 0v-6.919H4.574a.507.507 0 0 1 0-1.013h6.919V4.574a.506.506 0 0 1 1.012 0v6.919h6.919a.506.506 0 0 1 .506.506z"></path>
                            </svg>
                        </span>
                    </button>
                    <button class="k-zoom-out k-button k-icon-button" aria-label="Zoom out">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-minus" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M19.931 12a.506.506 0 0 1-.506.506H4.575a.507.507 0 0 1 0-1.013h14.85a.506.506 0 0 1 .506.506z"></path>
                            </svg>
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

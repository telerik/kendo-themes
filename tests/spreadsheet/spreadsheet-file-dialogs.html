<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <style>
        .k-window {
            min-width: 400px;
            position: relative;
        }

    </style>
    <div id="test-area" class="k-d-grid k-grid-cols-2">
        <section>
            <div class="k-spreadsheet-window k-window" role="dialog" aria-labelledby="k-window-title-1">
                <div class="k-window-titlebar">
                    <span class="k-window-title" id="k-window-title-1">Create new file</span>
                    <div class="k-window-titlebar-actions">
                        <button class="k-window-titlebar-action k-button k-button-xs k-button-flat k-icon-button" aria-label="x">
                            <span class="k-button-icon k-icon k-svg-icon k-svg-i-x" aria-hidden="true">
                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path d="M19.72 18.86a.607.607 0 1 1-.858.858l-6.861-6.859-6.86 6.859a.607.607 0 0 1-.859-.858L11.141 12 4.282 5.14a.607.607 0 0 1 .859-.86l6.86 6.86 6.861-6.86a.607.607 0 0 1 .858.86L12.86 12z"></path>
                                </svg>
                            </span>
                        </button>
                    </div>
                </div>
                <div class="k-window-content">
                    <p>Are you sure you want to close this file without saving it and create a new one?</p>
                </div>
                <div class="k-actions k-actions-stretched k-actions-horizontal k-window-actions">
                    <button class="k-button k-button-primary">
                        <span class="k-button-text">Create new file</span>
                    </button>
                    <button class="k-button">
                        <span class="k-button-text">Cancel</span>
                    </button>
                </div>
            </div>
        </section>
        <section>
            <div class="k-spreadsheet-window k-window" role="dialog" aria-labelledby="k-window-title-2">
                <div class="k-window-titlebar">
                    <span class="k-window-title" id="k-window-title-2">Save</span>
                    <div class="k-window-titlebar-actions">
                        <button class="k-window-titlebar-action k-button k-button-xs k-button-flat k-icon-button" aria-label="x">
                            <span class="k-button-icon k-icon k-svg-icon k-svg-i-x" aria-hidden="true">
                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path d="M19.72 18.86a.607.607 0 1 1-.858.858l-6.861-6.859-6.86 6.859a.607.607 0 0 1-.859-.858L11.141 12 4.282 5.14a.607.607 0 0 1 .859-.86l6.86 6.86 6.861-6.86a.607.607 0 0 1 .858.86L12.86 12z"></path>
                                </svg>
                            </span>
                        </button>
                    </div>
                </div>
                <div class="k-window-content">
                    <form class="k-form">
                        <div class="k-form-field">
                            <label class="k-form-label k-label">File name</label>
                            <div class="k-form-field-wrap">
                                <span class="k-textbox k-input">
                                    <input class="k-input-inner" placeholder="Workbook" autocomplete="off" type="text" value="">
                                </span>
                            </div>
                        </div>
                        <div class="k-form-field">
                            <label class="k-form-label k-label">Save as type</label>
                            <div class="k-form-field-wrap">
                                <span class="k-dropdownlist k-picker" role="combobox" aria-haspopup="listbox" aria-expanded="false" tabindex="0">
                                    <span class="k-input-inner">Excel Workbook (.xlsx)</span>
                                    <button class="k-input-button k-button k-icon-button" aria-label="Excel Workbook (.xlsx)" tabindex="-1">
                                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-down" aria-hidden="true">
                                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                <path d="m20.53 9.19-8.1 8.1a.607.607 0 0 1-.86 0l-8.1-8.1a.607.607 0 0 1 .86-.86L12 16l7.67-7.67a.607.607 0 0 1 .858.858z"></path>
                                            </svg>
                                        </span>
                                    </button>
                                </span>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="k-actions k-actions-start k-actions-horizontal k-window-actions">
                    <button class="k-button k-button-primary">
                        <span class="k-button-text">Save</span>
                    </button>
                    <button class="k-button">
                        <span class="k-button-text">Cancel</span>
                    </button>
                </div>
            </div>
        </section>
        <section>
            <div class="k-spreadsheet-window k-window" role="dialog" aria-labelledby="k-window-title-3">
                <div class="k-window-titlebar">
                    <span class="k-window-title" id="k-window-title-3">Open file</span>
                    <div class="k-window-titlebar-actions">
                        <button class="k-window-titlebar-action k-button k-button-xs k-button-flat k-icon-button" aria-label="x">
                            <span class="k-button-icon k-icon k-svg-icon k-svg-i-x" aria-hidden="true">
                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path d="M19.72 18.86a.607.607 0 1 1-.858.858l-6.861-6.859-6.86 6.859a.607.607 0 0 1-.859-.858L11.141 12 4.282 5.14a.607.607 0 0 1 .859-.86l6.86 6.86 6.861-6.86a.607.607 0 0 1 .858.86L12.86 12z"></path>
                                </svg>
                            </span>
                        </button>
                    </div>
                </div>
                <div class="k-window-content">
                    <div class="k-external-dropzone">
                        <div class="k-dropzone-inner">
                            <span class="k-dropzone-icon k-icon k-svg-icon k-icon-xxxl k-svg-i-upload" aria-hidden="true">
                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path d="M23.137 12.81v6.48a1.416 1.416 0 0 1-1.417 1.417H2.28A1.416 1.416 0 0 1 .863 19.29v-6.48a1.416 1.416 0 0 1 1.417-1.417h4.86a.608.608 0 0 1 0 1.215H2.28a.204.204 0 0 0-.203.203v6.48a.204.204 0 0 0 .203.203h19.44a.204.204 0 0 0 .203-.203v-6.48a.204.204 0 0 0-.203-.203h-4.86a.607.607 0 0 1 0-1.214h4.86a1.416 1.416 0 0 1 1.417 1.417zM7.568 6.76l3.824-3.822V12a.608.608 0 0 0 1.215 0V2.938L16.43 6.76a.607.607 0 0 0 .86-.86l-4.86-4.86a.607.607 0 0 0-.86 0L6.71 5.9a.607.607 0 0 0 .86.86zm11.519 9.29a1.013 1.013 0 1 0-1.013 1.013 1.013 1.013 0 0 0 1.013-1.013"></path>
                                </svg>
                            </span>
                            <span class="k-dropzone-hint">Drag and drop files here to upload</span>
                        </div>
                    </div>
                    <div class="k-upload k-upload-async k-upload-empty">
                        <div class="k-upload-dropzone k-dropzone">
                            <div class="k-upload-button-wrap">
                                <button class="k-upload-button k-button">
                                    <span class="k-button-text">Select files...</span>
                                </button>
                                <input id="upload-input" class="k-hidden" tabindex="-1" aria-hidden="true">
                            </div>
                            <span class="k-dropzone-hint">Drop files here to upload</span>
                        </div>
                    </div>
                </div>
                <div class="k-actions k-actions-start k-actions-horizontal k-window-actions">
                    <button class="k-button k-button-primary">
                        <span class="k-button-text">Open</span>
                    </button>
                    <button class="k-button">
                        <span class="k-button-text">Cancel</span>
                    </button>
                </div>
            </div>
        </section>
    </div>
</body>
</html>

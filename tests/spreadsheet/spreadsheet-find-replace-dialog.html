<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <style>
        .k-window {
            min-width: 400px;
            position: relative;
        }

    </style>
    <div id="test-area" class="k-d-grid k-grid-cols-2">
        <section>
            <div class="k-spreadsheet-window k-window" role="dialog" aria-labelledby="k-window-title-1">
                <div class="k-window-titlebar">
                    <span class="k-window-title" id="k-window-title-1">Find and Replace</span>
                    <div class="k-window-titlebar-actions">
                        <button class="k-window-titlebar-action k-button k-button-xs k-button-flat k-icon-button" aria-label="x">
                            <span class="k-button-icon k-icon k-svg-icon k-svg-i-x" aria-hidden="true">
                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path d="M19.72 18.86a.607.607 0 1 1-.858.858l-6.861-6.859-6.86 6.859a.607.607 0 0 1-.859-.858L11.141 12 4.282 5.14a.607.607 0 0 1 .859-.86l6.86 6.86 6.861-6.86a.607.607 0 0 1 .858.86L12.86 12z"></path>
                                </svg>
                            </span>
                        </button>
                    </div>
                </div>
                <div class="k-window-content">
                    <form class="k-form">
                        <div class="k-form-field">
                            <label class="k-form-label k-label">Find</label>
                            <div class="k-form-field-wrap">
                                <span class="k-textbox k-input">
                                    <input class="k-input-inner" placeholder="Placeholder" autocomplete="off" type="text" value="">
                                </span>
                            </div>
                        </div>
                        <div class="k-form-field">
                            <label class="k-form-label k-label">Replace with</label>
                            <div class="k-form-field-wrap">
                                <span class="k-textbox k-input">
                                    <input class="k-input-inner" placeholder="Placeholder" autocomplete="off" type="text" value="">
                                </span>
                            </div>
                        </div>
                        <div class="k-form-field">
                            <label class="k-form-label k-label">Search within</label>
                            <div class="k-form-field-wrap">
                                <span class="k-dropdownlist k-picker" role="combobox" aria-haspopup="listbox" aria-expanded="false" tabindex="0">
                                    <span class="k-input-inner">
                                        <span class="k-input-value-text">All Sheets</span>
                                    </span>
                                    <button class="k-input-button k-button k-icon-button" aria-label="Toggle dropdown" tabindex="-1">
                                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-down" aria-hidden="true">
                                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                <path d="m20.53 9.19-8.1 8.1a.607.607 0 0 1-.86 0l-8.1-8.1a.607.607 0 0 1 .86-.86L12 16l7.67-7.67a.607.607 0 0 1 .858.858z"></path>
                                            </svg>
                                        </span>
                                    </button>
                                </span>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="k-actions k-actions-start k-actions-horizontal k-window-actions">
                    <button class="k-button k-button-primary">
                        <span class="k-button-text">Done</span>
                    </button>
                    <button class="k-button">
                        <span class="k-button-text">Find</span>
                    </button>
                    <button class="k-button">
                        <span class="k-button-text">Replace</span>
                    </button>
                    <button class="k-button">
                        <span class="k-button-text">Replace All</span>
                    </button>
                </div>
            </div>
        </section>
    </div>
</body>
</html>

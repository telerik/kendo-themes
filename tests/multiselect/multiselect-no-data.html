<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/default/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <style>
        #test-area {
            max-width: 420px;
        }

    </style>
    <div id="test-area">
        <span class="k-multiselect k-input">
            <div class="k-input-values">
                <div id="multiselect-no-data-taglist" class="k-chip-list"></div>
                <input role="combobox" aria-label="MultiSelect" aria-haspopup="listbox" aria-expanded="true" aria-controls="multiselect-no-data-listbox" aria-autocomplete="list" aria-describedby="multiselect-no-data-taglist" tabindex="0" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
            </div>
        </span>
        <div id="multiselect-no-data-popup" class="k-multiselect-popup-container k-animation-container k-animation-container-shown" role="region" aria-label="MultiSelect suggestions">
            <div class="k-child-animation-container">
                <div class="k-list-container k-multiselect-popup k-popup">
                    <div class="k-list">
                        <span aria-live="polite" class="k-no-data">No data found.</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

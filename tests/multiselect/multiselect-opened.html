<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <style>
        #test-area {
            grid-template-columns: 160px repeat(2, 300px);
        }
        .k-animation-container {
            position: relative;
        }

    </style>
    <div id="test-area" class="k-d-grid">
        <span></span>
        <span>MultiSelect</span>
        <span>MultiSelect RTL</span>
        <div>Opened</div>
        <div>
            <span class="k-multiselect k-input">
                <div class="k-input-values">
                    <div id="k-ms-1-taglist" class="k-chip-list" role="listbox" aria-label="chip list" aria-orientation="horizontal"></div>
                    <input role="combobox" aria-haspopup="listbox" aria-expanded="true" aria-controls="k-ms-1-listbox" aria-activedescendant="k-ms-1-item-2" aria-autocomplete="list" aria-label="Select items" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
                </div>
            </span>
            <div class="k-animation-container k-animation-container-shown" role="region" aria-label="MultiSelect suggestions">
                <div class="k-child-animation-container">
                    <div class="k-list-container k-multiselect-popup k-popup">
                        <div class="k-list">
                            <div class="k-list-content">
                                <ul aria-label="Options" id="k-ms-listbox-1" role="listbox" class="k-list-ul">
                                    <li id="k-ms-1-item-1" role="option" tabindex="-1" aria-selected="true" class="k-list-item k-selected">
                                        <span class="k-list-item-text">Selected item</span>
                                    </li>
                                    <li id="k-ms-1-item-2" role="option" tabindex="0" aria-selected="false" class="k-list-item k-focus">
                                        <span class="k-list-item-text">Focused item</span>
                                    </li>
                                    <li id="k-ms-1-item-3" role="option" tabindex="-1" aria-selected="false" class="k-list-item">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                    <li id="k-ms-1-item-4" role="option" tabindex="-1" aria-selected="false" class="k-list-item">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div dir="rtl">
            <span class="k-multiselect k-input">
                <div class="k-input-values">
                    <div id="k-ms-2-taglist" class="k-chip-list" role="listbox" aria-label="chip list" aria-orientation="horizontal"></div>
                    <input role="combobox" aria-haspopup="listbox" aria-expanded="true" aria-controls="k-ms-2-listbox" aria-activedescendant="k-ms-1-item-6" aria-autocomplete="list" aria-label="Select items" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
                </div>
            </span>
            <div class="k-animation-container k-animation-container-shown" role="region" aria-label="MultiSelect suggestions">
                <div class="k-child-animation-container">
                    <div class="k-list-container k-multiselect-popup k-popup">
                        <div class="k-list">
                            <div class="k-list-content">
                                <ul aria-label="Options" id="k-ms-listbox-2" role="listbox" class="k-list-ul">
                                    <li id="k-ms-1-item-5" role="option" tabindex="-1" aria-selected="true" class="k-list-item k-selected">
                                        <span class="k-list-item-text">Selected item</span>
                                    </li>
                                    <li id="k-ms-1-item-6" role="option" tabindex="0" aria-selected="false" class="k-list-item k-focus">
                                        <span class="k-list-item-text">Focused item</span>
                                    </li>
                                    <li id="k-ms-1-item-7" role="option" tabindex="-1" aria-selected="false" class="k-list-item">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                    <li id="k-ms-1-item-8" role="option" tabindex="-1" aria-selected="false" class="k-list-item">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

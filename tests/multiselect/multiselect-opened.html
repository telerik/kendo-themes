<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/default/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <style>
        #test-area {
            grid-template-columns: 160px repeat(2, 300px);
        }
        .k-animation-container {
            position: relative;
        }

    </style>
    <div id="test-area" class="k-d-grid">
        <span></span>
        <span>MultiSelect</span>
        <span>MultiSelect RTL</span>
        <div>Opened</div>
        <div>
            <span class="k-multiselect k-input">
                <div class="k-input-values">
                    <div id="multiselect-taglist" class="k-chip-list"></div>
                    <input role="combobox" aria-label="MultiSelect" aria-haspopup="listbox" aria-expanded="true" aria-controls="multiselect-listbox" aria-activedescendant="multiselect-listbox-item-0" aria-autocomplete="list" aria-describedby="multiselect-taglist" tabindex="0" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
                </div>
            </span>
            <div id="multiselect-popup" class="k-multiselect-popup-container k-animation-container k-animation-container-shown" role="region" aria-label="MultiSelect suggestions">
                <div class="k-child-animation-container">
                    <div class="k-list-container k-multiselect-popup k-popup">
                        <div class="k-list">
                            <div class="k-list-content">
                                <ul class="k-list-ul" role="listbox" id="multiselect-listbox" aria-label="MultiSelect options" aria-multiselectable="true">
                                    <li id="multiselect-listbox-item-0" class="k-list-item k-focus k-selected" role="option" aria-selected="true" tabindex="0">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                    <li id="multiselect-listbox-item-1" class="k-list-item" role="option" aria-selected="false" tabindex="-1">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                    <li id="multiselect-listbox-item-2" class="k-list-item" role="option" aria-selected="false" tabindex="-1">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                    <li id="multiselect-listbox-item-3" class="k-list-item" role="option" aria-selected="false" tabindex="-1">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div dir="rtl">
            <span class="k-multiselect k-input">
                <div class="k-input-values">
                    <div id="multiselect-taglist" class="k-chip-list"></div>
                    <input role="combobox" aria-label="MultiSelect" aria-haspopup="listbox" aria-expanded="true" aria-controls="multiselect-listbox" aria-activedescendant="multiselect-listbox-item-0" aria-autocomplete="list" aria-describedby="multiselect-taglist" tabindex="0" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
                </div>
            </span>
            <div id="multiselect-popup" class="k-multiselect-popup-container k-animation-container k-animation-container-shown" role="region" aria-label="MultiSelect suggestions">
                <div class="k-child-animation-container">
                    <div class="k-list-container k-multiselect-popup k-popup">
                        <div class="k-list">
                            <div class="k-list-content">
                                <ul class="k-list-ul" role="listbox" id="multiselect-listbox" aria-label="MultiSelect options" aria-multiselectable="true">
                                    <li id="multiselect-listbox-item-0" class="k-list-item k-focus k-selected" role="option" aria-selected="true" tabindex="0">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                    <li id="multiselect-listbox-item-1" class="k-list-item" role="option" aria-selected="false" tabindex="-1">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                    <li id="multiselect-listbox-item-2" class="k-list-item" role="option" aria-selected="false" tabindex="-1">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                    <li id="multiselect-listbox-item-3" class="k-list-item" role="option" aria-selected="false" tabindex="-1">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

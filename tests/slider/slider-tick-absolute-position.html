<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <style>
        .k-slider-horizontal {
            width: 1px;
            width: 100%;
        }
        .k-slider-vertical {
            height: 300px;
        }
        .k-slider-items {
            position: relative;
        }
        .k-slider-horizontal .k-slider-track .k-slider-selection {
            width: 33%;
        }
        .k-slider-horizontal .k-slider-track .k-draghandle-end {
            left: 33%;
            z-index: 1;
        }
        .k-slider-vertical .k-slider-track .k-slider-selection {
            bottom: 0;
            height: 33%;
        }
        .k-slider-vertical .k-slider-track .k-draghandle-end {
            bottom: 33%;
            z-index: 1;
        }

    </style>
    <div id="test-area" class="k-d-grid k-grid-cols-2">
        <section>
            <div aria-label="Slider" class="k-slider k-slider-horizontal">
                <button class="k-button-decrease k-button k-rounded-full k-icon-button" tabindex="-1" title="Decrease">
                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-left" aria-hidden="true">
                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M15.67 19.67a.607.607 0 1 1-.86.858l-8.1-8.1a.607.607 0 0 1 0-.859l8.1-8.1a.607.607 0 0 1 .86.859L8 11.999z"></path>
                        </svg>
                    </span>
                </button>
                <div class="k-slider-track-wrap">
                    <ul class="k-reset k-slider-items" aria-hidden="true">
                        <li role="presentation" title="0" class="k-tick k-tick-horizontal k-tick-large" style="z-index: 1; position: absolute; left: 0%;">
                            <span class="k-label">0</span>
                        </li>
                        <li role="presentation" title="33" class="k-tick k-tick-horizontal k-tick-large" style="z-index: 1; position: absolute; left: 33%;">
                            <span class="k-label">33</span>
                        </li>
                        <li role="presentation" title="50" class="k-tick k-tick-horizontal k-tick-large" style="z-index: 1; position: absolute; left: 50%;">
                            <span class="k-label">50</span>
                        </li>
                        <li role="presentation" title="75" class="k-tick k-tick-horizontal k-tick-large" style="z-index: 1; position: absolute; left: 75%;">
                            <span class="k-label">75</span>
                        </li>
                        <li role="presentation" title="100" class="k-tick k-tick-horizontal k-tick-large" style="z-index: 1; position: absolute; left: 100%;">
                            <span class="k-label">100</span>
                        </li>
                    </ul>
                    <div class="k-slider-track">
                        <div class="k-slider-selection"></div>
                        <span class="k-draghandle k-draghandle-end" role="slider" tabindex="0" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100" aria-label="Slider"></span>
                    </div>
                </div>
                <button class="k-button-increase k-button k-rounded-full k-icon-button" tabindex="-1" title="Increase">
                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-right" aria-hidden="true">
                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="m17.29 12.43-8.1 8.1a.607.607 0 0 1-.86-.858L16 12.001l-7.67-7.67a.607.607 0 0 1 .858-.859l8.1 8.1a.607.607 0 0 1 0 .859z"></path>
                        </svg>
                    </span>
                </button>
            </div>
        </section>
        <section style="justify-self: center;">
            <div aria-label="Vertical slider" class="k-slider k-slider-vertical">
                <button class="k-button-decrease k-button k-rounded-full k-icon-button" tabindex="-1" title="Decrease">
                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-down" aria-hidden="true">
                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="m20.53 9.19-8.1 8.1a.607.607 0 0 1-.86 0l-8.1-8.1a.607.607 0 0 1 .86-.86L12 16l7.67-7.67a.607.607 0 0 1 .858.858z"></path>
                        </svg>
                    </span>
                </button>
                <div class="k-slider-track-wrap">
                    <ul class="k-reset k-slider-items" aria-hidden="true">
                        <li role="presentation" title="0" class="k-tick k-tick-vertical k-tick-large" style="z-index: 1; position: absolute; bottom: 0%;">
                            <span class="k-label">0</span>
                        </li>
                        <li role="presentation" title="33" class="k-tick k-tick-vertical k-tick-large" style="z-index: 1; position: absolute; bottom: 33%;">
                            <span class="k-label">33</span>
                        </li>
                        <li role="presentation" title="50" class="k-tick k-tick-vertical k-tick-large" style="z-index: 1; position: absolute; bottom: 50%;">
                            <span class="k-label">50</span>
                        </li>
                        <li role="presentation" title="75" class="k-tick k-tick-vertical k-tick-large" style="z-index: 1; position: absolute; bottom: 75%;">
                            <span class="k-label">75</span>
                        </li>
                        <li role="presentation" title="100" class="k-tick k-tick-vertical k-tick-large" style="z-index: 1; position: absolute; bottom: 100%;">
                            <span class="k-label">100</span>
                        </li>
                    </ul>
                    <div class="k-slider-track">
                        <div class="k-slider-selection"></div>
                        <span class="k-draghandle k-draghandle-end" role="slider" tabindex="0" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100" aria-orientation="vertical" aria-label="Vertical slider"></span>
                    </div>
                </div>
                <button class="k-button-increase k-button k-rounded-full k-icon-button" tabindex="-1" title="Increase">
                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-up" aria-hidden="true">
                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M20.53 15.67a.607.607 0 0 1-.858 0L12.001 8l-7.67 7.67a.607.607 0 0 1-.859-.86l8.1-8.1a.607.607 0 0 1 .859 0l8.1 8.1a.607.607 0 0 1 0 .86z"></path>
                        </svg>
                    </span>
                </button>
            </div>
        </section>
    </div>
</body>
</html>

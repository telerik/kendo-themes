<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 0px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/default/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <style>
        .k-window {
            position: relative;
        }
        .k-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10000;
        }

    </style>
    <div id="test-area" class="k-d-grid k-grid-cols-2">
        <section>
            <div class="k-overlay"></div>
            <div class="k-window" role="dialog" aria-modal="true" aria-labelledby="k-window-title">
                <div class="k-window-titlebar">
                    <span class="k-window-title" id="k-window-title">Modal Window</span>
                    <div class="k-window-titlebar-actions">
                        <button class="k-window-titlebar-action k-button k-button-flat k-icon-button" aria-label="X">
                            <span class="k-button-icon k-icon k-svg-icon k-svg-i-x" aria-hidden="true">
                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                                    <path d="M416 141.3 301.3 256 416 370.7 370.7 416 256 301.3 141.3 416 96 370.7 210.7 256 96 141.3 141.3 96 256 210.7 370.7 96z"></path>
                                </svg>
                            </span>
                        </button>
                    </div>
                </div>
                <div class="k-window-content">
                    <p>This is a modal window with overlay.</p>
                </div>
            </div>
        </section>
        <section>
            <div class="k-overlay"></div>
            <div class="k-window" role="dialog" aria-modal="true" aria-labelledby="k-window-title">
                <div class="k-window-titlebar">
                    <span class="k-window-title" id="k-window-title">Confirm Action</span>
                    <div class="k-window-titlebar-actions">
                        <button class="k-window-titlebar-action k-button k-button-flat k-icon-button" aria-label="X">
                            <span class="k-button-icon k-icon k-svg-icon k-svg-i-x" aria-hidden="true">
                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                                    <path d="M416 141.3 301.3 256 416 370.7 370.7 416 256 301.3 141.3 416 96 370.7 210.7 256 96 141.3 141.3 96 256 210.7 370.7 96z"></path>
                                </svg>
                            </span>
                        </button>
                    </div>
                </div>
                <div class="k-window-content">
                    <p>Are you sure you want to proceed?</p>
                </div>
                <div class="k-actions k-actions-end k-actions-horizontal k-window-actions">
                    <button class="k-button">
                        <span class="k-button-text">Cancel</span>
                    </button>
                    <button class="k-button k-button-primary">
                        <span class="k-button-text">OK</span>
                    </button>
                </div>
            </div>
        </section>
    </div>
</body>
</html>

<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/default/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <style>
        #test-area {
            max-width: 660px;
        }
        .k-animation-container {
            position: relative;
        }

    </style>
    <div id="test-area" class="k-d-grid k-grid-cols-2">
        <span>Smart box - Opened</span>
        <span>Smart box - Opened RTL</span>
        <div>
            <span class="k-smart-box k-input">
                <input role="combobox" aria-haspopup="listbox" aria-expanded="true" aria-autocomplete="list" aria-controls="smart-box-listbox" aria-label="AI-powered search" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
            </span>
            <div class="k-animation-container k-animation-container-shown">
                <div class="k-child-animation-container">
                    <div class="k-smart-box-popup k-popup">
                        <div class="k-list">
                            <div class="k-list-content">
                                <ul aria-label="Suggestions" id="smart-box-listbox" role="listbox" class="k-list-ul">
                                    <li role="option" tabindex="-1" aria-selected="false" class="k-list-item">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                    <li role="option" tabindex="-1" aria-selected="false" class="k-list-item">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div dir="rtl">
            <span class="k-smart-box k-input">
                <input role="combobox" aria-haspopup="listbox" aria-expanded="true" aria-autocomplete="list" aria-controls="smart-box-listbox" aria-label="AI-powered search" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
            </span>
            <div class="k-animation-container k-animation-container-shown">
                <div class="k-child-animation-container">
                    <div class="k-smart-box-popup k-popup">
                        <div class="k-list">
                            <div class="k-list-content">
                                <ul aria-label="Suggestions" id="smart-box-listbox" role="listbox" class="k-list-ul">
                                    <li role="option" tabindex="-1" aria-selected="false" class="k-list-item">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                    <li role="option" tabindex="-1" aria-selected="false" class="k-list-item">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

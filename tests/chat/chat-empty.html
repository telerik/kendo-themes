<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <style>
        #test-area {
            max-width: 1240px;
        }
        .k-chat {
            min-height: 500px;
            min-width: auto;
        }
        .k-message-list-content-empty {
            background-color: var(--kendo-color-base);
        }

    </style>
    <div id="test-area" class="k-d-grid k-grid-cols-2">
        <div>Chat with empty content</div>
        <div></div>
        <section>
            <div class="k-chat">
                <div class="k-message-list" role="log" aria-label="Message list" aria-live="polite">
                    <div class="k-message-list-content k-message-list-content-empty"></div>
                </div>
                <div class="k-message-box-wrapper">
                    <div class="k-input k-prompt-box k-prompt-box-multiline">
                        <div class="k-prompt-box-content">
                            <textarea class="k-prompt-box-textarea k-input-inner" aria-label="Prompt input" aria-multiline="true" placeholder="Type a message" rows="3"></textarea>
                            <div class="k-prompt-box-affix">
                                <button class="k-button k-button-sm k-button-clear k-rounded-full k-icon-button" aria-label="Attach file">
                                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-paperclip" aria-hidden="true">
                                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                            <path d="M18.771 11.642a.506.506 0 0 1 0 .716l-6.924 6.919a4.557 4.557 0 0 1-6.443-6.445l8.376-8.498a3.207 3.207 0 1 1 4.537 4.533L9.94 17.362a1.857 1.857 0 1 1-2.628-2.623l7.027-7.144a.506.506 0 0 1 .722.71l-7.027 7.147a.844.844 0 1 0 1.191 1.196l8.373-8.496a2.194 2.194 0 1 0-3.1-3.105l-8.377 8.495a3.544 3.544 0 1 0 5.009 5.015l6.924-6.919a.506.506 0 0 1 .716.003z"></path>
                                        </svg>
                                    </span>
                                </button>
                                <div class="k-spacer"></div>
                                <button class="k-speech-to-text-button k-button k-button-sm k-button-flat k-rounded-full k-icon-button" aria-label="Start listening"></button>
                                <button class="k-button k-button-sm k-rounded-full k-disabled k-icon-button" aria-label="Send prompt" aria-live="polite" disabled="">
                                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-arrow-up" aria-hidden="true">
                                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                            <path d="M18.433 11.008a.506.506 0 0 1-.715 0l-5.211-5.21v13.627a.507.507 0 0 1-1.013 0V5.798l-5.211 5.21a.506.506 0 0 1-.716-.716l6.075-6.075a.506.506 0 0 1 .716 0l6.075 6.075a.506.506 0 0 1 0 .716"></path>
                                        </svg>
                                    </span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <section>
            <div class="k-chat">
                <div class="k-message-list" role="log" aria-label="Message list" aria-live="polite">
                    <div class="k-message-list-content k-message-list-content-empty">
                        <div>Empty chat - custom template here</div>
                    </div>
                </div>
                <div class="k-message-box-wrapper">
                    <div class="k-input k-prompt-box k-prompt-box-multiline">
                        <div class="k-prompt-box-content">
                            <textarea class="k-prompt-box-textarea k-input-inner" aria-label="Prompt input" aria-multiline="true" placeholder="Type a message" rows="3"></textarea>
                            <div class="k-prompt-box-affix">
                                <button class="k-button k-button-sm k-button-clear k-rounded-full k-icon-button" aria-label="Attach file">
                                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-paperclip" aria-hidden="true">
                                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                            <path d="M18.771 11.642a.506.506 0 0 1 0 .716l-6.924 6.919a4.557 4.557 0 0 1-6.443-6.445l8.376-8.498a3.207 3.207 0 1 1 4.537 4.533L9.94 17.362a1.857 1.857 0 1 1-2.628-2.623l7.027-7.144a.506.506 0 0 1 .722.71l-7.027 7.147a.844.844 0 1 0 1.191 1.196l8.373-8.496a2.194 2.194 0 1 0-3.1-3.105l-8.377 8.495a3.544 3.544 0 1 0 5.009 5.015l6.924-6.919a.506.506 0 0 1 .716.003z"></path>
                                        </svg>
                                    </span>
                                </button>
                                <div class="k-spacer"></div>
                                <button class="k-speech-to-text-button k-button k-button-sm k-button-flat k-rounded-full k-icon-button" aria-label="Start listening"></button>
                                <button class="k-button k-button-sm k-rounded-full k-disabled k-icon-button" aria-label="Send prompt" aria-live="polite" disabled="">
                                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-arrow-up" aria-hidden="true">
                                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                            <path d="M18.433 11.008a.506.506 0 0 1-.715 0l-5.211-5.21v13.627a.507.507 0 0 1-1.013 0V5.798l-5.211 5.21a.506.506 0 0 1-.716-.716l6.075-6.075a.506.506 0 0 1 .716 0l6.075 6.075a.506.506 0 0 1 0 .716"></path>
                                        </svg>
                                    </span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>

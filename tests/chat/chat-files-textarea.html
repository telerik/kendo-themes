<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <style>
        #test-area {
            max-width: 1240px;
        }
        .k-chat {
            min-height: 500px;
            min-width: auto;
        }

    </style>
    <div id="test-area" class="k-d-grid k-grid-cols-2">
        <span>Files within the Text Area (already uploaded before submission)</span>
        <span></span>
        <section>
            <div class="k-chat">
                <div class="k-message-list" role="log" aria-label="Message list" aria-live="polite">
                    <div class="k-message-list-content">
                        <div class="k-message-group k-message-group-receiver">
                            <div class="k-avatar">
                                <span class="k-avatar-image">
                                    <img alt="Bruv" src="/packages/html/assets/avatar.jpg">
                                </span>
                            </div>
                            <div class="k-message-group-content">
                                <span class="k-message-author">Bruv</span>
                                <div class="k-message">
                                    <div class="k-chat-bubble k-bubble" tabindex="0">
                                        <div class="k-bubble-content">
                                            <span class="k-chat-bubble-text">How can I help you?</span>
                                        </div>
                                    </div>
                                    <div class="k-message-info">
                                        <span class="k-message-status">Seen</span>
                                        <time class="k-message-time">Thu Feb 08 2018</time>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="k-message-box-wrapper">
                    <div class="k-input k-prompt-box k-prompt-box-multiline">

                            <textarea class="k-prompt-box-textarea k-input-inner" aria-label="Prompt input" aria-multiline="true" placeholder="Type a message" rows="3"></textarea>

                                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-paperclip" aria-hidden="true">
                                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">

</body>

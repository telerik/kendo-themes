<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <style>
        #filemanager-context-menu {
            position: absolute;
            top: 200px;
            left: 350px;
            z-index: 2;
            overflow: visible;
        }

    </style>
    <div id="test-area" class="k-d-grid k-grid-cols-1">
        <span>File Manager ContextMenu</span>
        <div class="k-filemanager">
            <div class="k-filemanager-header">

                    </button>
                    <div role="group" class="k-toolbar-button-group  k-button-group">
                        <button class="k-group-start k-button k-icon-button" aria-label="Sort ascending">
                            <span class="k-button-icon k-icon k-svg-icon k-svg-i-sort-asc-small" aria-hidden="true">

                                    <path d="M18.433 11.008a.506.506 0 0 1-.715 0l-5.211-5.21v13.627a.507.507 0 0 1-1.013 0V5.798l-5.211 5.21a.506.506 0 0 1-.716-.716l6.075-6.075a.506.506 0 0 1 .716 0l6.075 6.075a.506.506 0 0 1 0 .716"></path>

                            </span>
                        </button>
                        <button class="k-group-end k-button k-icon-button" aria-label="Sort descending">
                            <span class="k-button-icon k-icon k-svg-icon k-svg-i-sort-desc-small" aria-hidden="true">
                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">

                                </svg>
                            </span>
                        </button>
                    </div>
                    <div class="k-toolbar-split-button  k-split-button k-button-group">
                        <button class="k-button">
                            <span class="k-button-text">Sort By</span>
                        </button>
                        <button class="k-split-button-arrow k-button k-icon-button" aria-label="Toggle dropdown" aria-expanded="false" tabindex="-1">

                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">

                            </span>

                    </div>
                    <div class="k-spacer"></div>
                    <div class="k-filemanager-details-toggle">
                        <label>View Details</label>
                        <span aria-label="View Details" class="k-switch k-switch-off" role="switch" aria-checked="false" tabindex="0">
                            <span class="k-switch-track"></span>
                            <span class="k-switch-thumb-wrap">
                                <span class="k-switch-thumb"></span>
                            </span>
                        </span>
                    </div>
                    <span class="k-filemanager-search-tool k-searchbox k-input">

                                        </span>
                                    </span>
                                </li>
                            </ul>
                        </div>
                    </div>

                                        <span class="k-icon k-svg-icon k-svg-i-home" aria-hidden="true">

                                        </span>
                                    </span>

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

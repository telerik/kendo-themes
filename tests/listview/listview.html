<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <style>
        .k-listview-header,
        .k-listview-footer,
        .k-listview-item {
            padding: 10px;
        }

    </style>
    <div id="test-area" class="k-d-grid">
        <section>
            <span>Listview - bottom pager</span>
            <div class="k-listview">
                <div class="k-listview-header">Header</div>
                <div class="k-listview-content" role="list">
                    <div class="k-listview-item">
                        <div>Listview Item</div>
                    </div>
                    <div class="k-listview-item">
                        <div>Listview Item</div>
                    </div>
                    <div class="k-listview-item">
                        <div>Listview Item</div>
                    </div>
                    <div class="k-listview-item">
                        <div>Listview Item</div>
                    </div>
                </div>
                <div class="k-listview-footer">Footer</div>
                <div class="k-listview-pager k-listview-pager-bottom k-pager" role="application" aria-roledescription="pager" aria-keyshortcuts="Enter ArrowRight ArrowLeft" aria-label="Page 1 of 6">
                    <div class="k-pager-numbers-wrap">
                        <button class="k-pager-nav k-pager-first k-button k-button-flat k-disabled k-icon-button" title="Go to the first page" aria-label="Go to the first page" aria-disabled="true">
                            <span class="k-button-icon k-icon k-svg-icon k-svg-i-caret-alt-to-left" aria-hidden="true">
                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path d="M17.758 18.392a.506.506 0 1 1-.716.715l-6.75-6.75a.506.506 0 0 1 0-.716l6.75-6.75a.506.506 0 0 1 .716.716l-6.391 6.392zM7.275 4.743a.506.506 0 0 0-.506.506v13.5a.507.507 0 0 0 1.013 0v-13.5a.506.506 0 0 0-.506-.506z"></path>
                                </svg>
                            </span>
                        </button>
                        <button class="k-pager-nav k-button k-button-flat k-disabled k-icon-button" title="Go to the previous page" aria-label="Go to the previous page" aria-disabled="true">
                            <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-left" aria-hidden="true">
                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path d="M15.058 18.392a.506.506 0 1 1-.716.715l-6.75-6.75a.506.506 0 0 1 0-.716l6.75-6.75a.506.506 0 0 1 .716.716l-6.391 6.392z"></path>
                                </svg>
                            </span>
                        </button>
                        <div class="k-pager-numbers">
                            <button class="k-button k-button-flat k-button-primary k-selected" aria-label="Page 1" aria-current="page">
                                <span class="k-button-text">1</span>
                            </button>
                            <button class="k-button k-button-flat k-button-primary" aria-label="Page 2">
                                <span class="k-button-text">2</span>
                            </button>
                            <button class="k-button k-button-flat k-button-primary" aria-label="Page 3">
                                <span class="k-button-text">3</span>
                            </button>
                            <button class="k-button k-button-flat k-button-primary" aria-label="Page 4">
                                <span class="k-button-text">4</span>
                            </button>
                            <button class="k-button k-button-flat k-button-primary" aria-label="Page 5">
                                <span class="k-button-text">5</span>
                            </button>
                            <button class="k-button k-button-flat k-button-primary" aria-label="Page 6">
                                <span class="k-button-text">6</span>
                            </button>
                        </div>
                        <button class="k-pager-nav k-button k-button-flat k-icon-button" title="Go to the next page" aria-label="Go to the next page">
                            <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-right" aria-hidden="true">
                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path d="m16.408 12.358-6.75 6.75a.506.506 0 0 1-.716-.715l6.391-6.392-6.391-6.392a.506.506 0 0 1 .715-.716l6.75 6.75a.506.506 0 0 1 0 .716z"></path>
                                </svg>
                            </span>
                        </button>
                        <button class="k-pager-nav k-pager-last k-button k-button-flat k-icon-button" title="Go to the last page" aria-label="Go to the last page">
                            <span class="k-button-icon k-icon k-svg-icon k-svg-i-caret-alt-to-right" aria-hidden="true">
                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path d="M13.708 11.642a.506.506 0 0 1 0 .716l-6.75 6.75a.506.506 0 0 1-.716-.715l6.391-6.392-6.391-6.392a.506.506 0 0 1 .716-.716zm3.017-6.899a.506.506 0 0 0-.506.506v13.5a.506.506 0 0 0 1.012 0v-13.5a.506.506 0 0 0-.506-.506"></path>
                                </svg>
                            </span>
                        </button>
                    </div>
                    <span class="k-pager-sizes">
                        <span class="k-dropdownlist k-picker" role="combobox" aria-haspopup="listbox" aria-expanded="false" aria-label="Items per page" tabindex="0">
                            <span class="k-input-inner">
                                <span class="k-input-value-text">5</span>
                            </span>
                            <button class="k-input-button k-button k-icon-button" aria-label="Toggle dropdown" tabindex="-1">
                                <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-down" aria-hidden="true">
                                    <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                        <path d="m19.108 9.658-6.75 6.75a.506.506 0 0 1-.716 0l-6.75-6.75a.506.506 0 0 1 .716-.716L12 15.333l6.392-6.391a.506.506 0 0 1 .715.715z"></path>
                                    </svg>
                                </span>
                            </button>
                        </span>
                        <span>items per page</span>
                    </span>
                    <button class="k-pager-refresh k-button k-button-flat k-icon-button" title="Refresh" aria-label="Refresh">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-arrow-rotate-cw" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M21.281 5.925v4.05a.506.506 0 0 1-.506.506h-4.05a.507.507 0 0 1 0-1.013h2.746l-2.563-2.346-.016-.016a6.919 6.919 0 1 0-.143 9.927.507.507 0 0 1 .695.737A7.9 7.9 0 0 1 12 19.931h-.108A7.931 7.931 0 1 1 17.6 6.38l2.669 2.443V5.925a.506.506 0 1 1 1.012 0"></path>
                            </svg>
                        </span>
                    </button>
                    <span class="k-pager-info">1 - 5 of 20 items</span>
                </div>
            </div>
        </section>
        <section>
            <span>ListViewItem - states</span>
            <div class="k-listview">
                <div class="k-listview-header">Header</div>
                <div class="k-listview-content" role="list">
                    <div class="k-listview-item">
                        <div>Listview Item</div>
                    </div>
                    <div class="k-listview-item k-focus">
                        <div>Focus Item</div>
                    </div>
                    <div class="k-listview-item k-selected">
                        <div>Selected Item</div>
                    </div>
                    <div class="k-listview-item k-focus k-selected">
                        <div>Focus Selected Item</div>
                    </div>
                </div>
                <div class="k-listview-footer">Footer</div>
            </div>
        </section>
    </div>
</body>
</html>

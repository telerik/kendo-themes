<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <div id="test-area" class="k-d-grid k-grid-cols-2">
        <span>DateRangePicker</span>
        <span>DateRangePicker RTL</span>
        <div>
            <span>normal</span>
            <span class="k-daterangepicker">
                <span class="k-floating-label-container">
                    <span class="k-dateinput k-input k-input-solid">
                        <input aria-label="Start date" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
                    </span>
                    <label class="k-floating-label">Start</label>
                </span>
                <span class="k-floating-label-container">
                    <span class="k-dateinput k-input k-input-solid">
                        <input aria-label="End date" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
                    </span>
                    <label class="k-floating-label">End</label>
                </span>
            </span>
        </div>
        <div dir="rtl">
            <span>normal</span>
            <span class="k-daterangepicker">
                <span class="k-floating-label-container">
                    <span class="k-dateinput k-input k-input-solid">
                        <input aria-label="Start date" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
                    </span>
                    <label class="k-floating-label">Start</label>
                </span>
                <span class="k-floating-label-container">
                    <span class="k-dateinput k-input k-input-solid">
                        <input aria-label="End date" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
                    </span>
                    <label class="k-floating-label">End</label>
                </span>
            </span>
        </div>
        <div>
            <span>disabled</span>
            <span class="k-daterangepicker k-disabled">
                <span class="k-floating-label-container">
                    <span class="k-dateinput k-input k-input-solid">
                        <input aria-label="Start date" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
                    </span>
                    <label class="k-floating-label">Start</label>
                </span>
                <span class="k-floating-label-container">
                    <span class="k-dateinput k-input k-input-solid">
                        <input aria-label="End date" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
                    </span>
                    <label class="k-floating-label">End</label>
                </span>
            </span>
        </div>
        <div dir="rtl">
            <span>disabled</span>
            <span class="k-daterangepicker k-disabled">
                <span class="k-floating-label-container">
                    <span class="k-dateinput k-input k-input-solid">
                        <input aria-label="Start date" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
                    </span>
                    <label class="k-floating-label">Start</label>
                </span>
                <span class="k-floating-label-container">
                    <span class="k-dateinput k-input k-input-solid">
                        <input aria-label="End date" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
                    </span>
                    <label class="k-floating-label">End</label>
                </span>
            </span>
        </div>
        <div>
            <span>With Swap Button</span>
            <span class="k-daterangepicker">
                <span class="k-floating-label-container">
                    <span class="k-dateinput k-input k-input-solid">
                        <input aria-label="Start date" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
                    </span>
                    <label class="k-floating-label">Start</label>
                </span>
                <button class="k-button k-button-flat k-icon-button" aria-label="Swap dates">
                    <span class="k-rotate-90 k-button-icon k-icon k-svg-icon k-svg-i-arrows-swap" aria-hidden="true">
                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M10.81 16.43a.607.607 0 0 1 0 .86l-3.24 3.24a.607.607 0 0 1-.86 0l-3.24-3.24a.607.607 0 0 1 .86-.86l2.203 2.202V3.9a.608.608 0 0 1 1.215 0v14.732l2.204-2.202a.607.607 0 0 1 .859 0zm9.72-9.72-3.24-3.24a.607.607 0 0 0-.86 0l-3.24 3.24a.607.607 0 0 0 .86.86l2.203-2.202V20.1a.608.608 0 0 0 1.215 0V5.368l2.204 2.202a.607.607 0 0 0 .858-.86"></path>
                        </svg>
                    </span>
                </button>
                <span class="k-floating-label-container">
                    <span class="k-dateinput k-input k-input-solid">
                        <input aria-label="End date" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
                    </span>
                    <label class="k-floating-label">End</label>
                </span>
            </span>
        </div>
        <div dir="rtl">
            <span>With Swap Button RTL</span>
            <span class="k-daterangepicker">
                <span class="k-floating-label-container">
                    <span class="k-dateinput k-input k-input-solid">
                        <input aria-label="Start date" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
                    </span>
                    <label class="k-floating-label">Start</label>
                </span>
                <button class="k-button k-button-flat k-icon-button" aria-label="Swap dates">
                    <span class="k-rotate-90 k-button-icon k-icon k-svg-icon k-svg-i-arrows-swap" aria-hidden="true">
                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M10.81 16.43a.607.607 0 0 1 0 .86l-3.24 3.24a.607.607 0 0 1-.86 0l-3.24-3.24a.607.607 0 0 1 .86-.86l2.203 2.202V3.9a.608.608 0 0 1 1.215 0v14.732l2.204-2.202a.607.607 0 0 1 .859 0zm9.72-9.72-3.24-3.24a.607.607 0 0 0-.86 0l-3.24 3.24a.607.607 0 0 0 .86.86l2.203-2.202V20.1a.608.608 0 0 0 1.215 0V5.368l2.204 2.202a.607.607 0 0 0 .858-.86"></path>
                        </svg>
                    </span>
                </button>
                <span class="k-floating-label-container">
                    <span class="k-dateinput k-input k-input-solid">
                        <input aria-label="End date" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
                    </span>
                    <label class="k-floating-label">End</label>
                </span>
            </span>
        </div>
    </div>
</body>
</html>

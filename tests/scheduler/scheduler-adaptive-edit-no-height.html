<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <div id="test-area" class="k-d-grid k-grid-cols-1">
        <section>
            <div class="k-pane-wrapper">
                <div class="k-pane">
                    <div class="k-popup-edit-form k-scheduler-edit-form k-mobile-list k-view">
                        <div class="k-appbar k-appbar-primary">
                            <button class="k-header-cancel k-button k-button-flat k-icon-button">
                                <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-left" aria-hidden="true">
                                    <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                        <path d="M15.058 18.392a.506.506 0 1 1-.716.715l-6.75-6.75a.506.506 0 0 1 0-.716l6.75-6.75a.506.506 0 0 1 .716.716l-6.391 6.392z"></path>
                                    </svg>
                                </span>
                            </button>
                            <span class="k-spacer"></span>
                            <span>Event</span>
                            <span class="k-spacer"></span>
                            <button class="k-header-done k-button k-button-flat k-icon-button">
                                <span class="k-button-icon k-icon k-svg-icon k-svg-i-check" aria-hidden="true">
                                    <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                        <path d="m20.458 7.633-10.8 10.8a.506.506 0 0 1-.716 0l-4.725-4.725a.506.506 0 0 1 .716-.716L9.3 17.358 19.742 6.917a.506.506 0 0 1 .715.716z"></path>
                                    </svg>
                                </span>
                            </button>
                        </div>
                        <div class="k-stretched-view k-content">
                            <ul class="k-listgroup k-listgroup-flush">
                                <li class="k-item k-listgroup-item">
                                    <label class="k-label k-listgroup-form-row">
                                        <span class="k-item-title k-listgroup-form-field-label">Title</span>
                                        <div class="k-listgroup-form-field-wrapper">
                                            <input type="text">
                                        </div>
                                    </label>
                                </li>
                                <li class="k-item k-listgroup-item">
                                    <label class="k-label k-listgroup-form-row">
                                        <span class="k-item-title k-listgroup-form-field-label">Start</span>
                                        <div class="k-listgroup-form-field-wrapper">
                                            <input type="datetime-local">
                                        </div>
                                    </label>
                                </li>
                                <li class="k-item k-listgroup-item">
                                    <label class="k-label k-listgroup-form-row">
                                        <span class="k-item-title k-listgroup-form-field-label">End</span>
                                        <div class="k-listgroup-form-field-wrapper">
                                            <input type="datetime-local">
                                        </div>
                                    </label>
                                </li>
                                <li class="k-item k-listgroup-item">
                                    <label class="k-label k-listgroup-form-row">
                                        <span class="k-item-title k-listgroup-form-field-label">All day event</span>
                                        <div class="k-listgroup-form-field-wrapper">
                                            <input type="checkbox">
                                        </div>
                                    </label>
                                </li>
                            </ul>
                            <ul class="k-listgroup k-listgroup-flush">
                                <li class="k-item k-listgroup-item">
                                    <label class="k-label k-listgroup-form-row">
                                        <span class="k-item-title k-listgroup-form-field-label">Timezone</span>
                                        <div class="k-listgroup-form-field-wrapper">
                                            <span class="k-timezone-label">No timezone</span>
                                            <span class="k-icon k-svg-icon k-svg-i-chevron-right" aria-hidden="true">
                                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                    <path d="m16.408 12.358-6.75 6.75a.506.506 0 0 1-.716-.715l6.391-6.392-6.391-6.392a.506.506 0 0 1 .715-.716l6.75 6.75a.506.506 0 0 1 0 .716z"></path>
                                                </svg>
                                            </span>
                                        </div>
                                    </label>
                                </li>
                            </ul>
                            <ul class="k-listgroup k-listgroup-flush">
                                <li class="k-item k-listgroup-item">
                                    <label class="k-label k-listgroup-form-row">
                                        <span class="k-item-title k-listgroup-form-field-label">Repeat</span>
                                        <div class="k-listgroup-form-field-wrapper">
                                            <span>Never</span>
                                            <span class="k-icon k-svg-icon k-svg-i-chevron-right" aria-hidden="true">
                                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                    <path d="m16.408 12.358-6.75 6.75a.506.506 0 0 1-.716-.715l6.391-6.392-6.391-6.392a.506.506 0 0 1 .715-.716l6.75 6.75a.506.506 0 0 1 0 .716z"></path>
                                                </svg>
                                            </span>
                                        </div>
                                    </label>
                                </li>
                            </ul>
                            <ul class="k-listgroup k-listgroup-flush">
                                <li class="k-item k-listgroup-item">
                                    <label class="k-label k-listgroup-form-row">
                                        <span class="k-item-title k-listgroup-form-field-label">Description</span>
                                        <div class="k-listgroup-form-field-wrapper">
                                            <textarea></textarea>
                                        </div>
                                    </label>
                                </li>
                                <li class="k-item k-listgroup-item">
                                    <label class="k-label k-listgroup-form-row">
                                        <span class="k-item-title k-listgroup-form-field-label">Owner</span>
                                        <div class="k-listgroup-form-field-wrapper">
                                            <select>
                                                <option>Alex</option>
                                            </select>
                                        </div>
                                    </label>
                                </li>
                            </ul>
                            <ul class="k-edit-buttons k-listgroup k-listgroup-flush">
                                <li class="k-item k-listgroup-item">
                                    <span class="k-scheduler-delete k-link k-label">Delete</span>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>

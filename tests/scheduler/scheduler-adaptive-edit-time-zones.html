<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <div id="test-area" class="k-d-grid k-grid-cols-1">
        <section>
            <div class="k-pane-wrapper" style="height: 600px;">
                <div class="k-pane">
                    <div class="k-popup-edit-form k-scheduler-edit-form k-mobile-list k-view">
                        <div class="k-appbar k-appbar-primary">
                            <button class="k-header-cancel k-button k-button-flat k-icon-button">
                                <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-left" aria-hidden="true">
                                    <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                        <path d="M15.67 19.67a.607.607 0 1 1-.86.858l-8.1-8.1a.607.607 0 0 1 0-.859l8.1-8.1a.607.607 0 0 1 .86.859L8 11.999z"></path>
                                    </svg>
                                </span>
                            </button>
                            <span class="k-spacer"></span>
                            <span>Time zones</span>
                            <span class="k-spacer"></span>
                            <button class="k-header-done k-button k-button-flat k-icon-button">
                                <span class="k-button-icon k-icon k-svg-icon k-svg-i-check" aria-hidden="true">
                                    <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                        <path d="M22.15 6.76 9.19 19.72a.607.607 0 0 1-.86 0l-5.67-5.67a.607.607 0 0 1 .86-.86l5.24 5.24L21.29 5.9a.607.607 0 0 1 .858.86z"></path>
                                    </svg>
                                </span>
                            </button>
                        </div>
                        <div class="k-stretched-view k-content">
                            <div class="k-popup-edit-form k-scheduler-edit-form k-scheduler-timezones">
                                <ul class="k-listgroup k-listgroup-flush">
                                    <li class="k-item k-listgroup-item">
                                        <label class="k-label k-listgroup-form-row">
                                            <span class="k-listgroup-form-field-label k-item-title">Use separate start and end time zones</span>
                                            <span class="k-listgroup-form-field-wrapper">
                                                <input type="checkbox" checked="">
                                            </span>
                                        </label>
                                    </li>
                                    <li class="k-item k-listgroup-item">
                                        <label class="k-label k-listgroup-form-row">
                                            <span class="k-listgroup-form-field-label k-item-title">Start timezone</span>
                                            <div class="k-listgroup-form-field-wrapper">
                                                <div class="k-mobiletimezoneeditor">
                                                    <select>
                                                        <option>No timezone</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </label>
                                    </li>
                                    <li class="k-item k-listgroup-item k-zonepicker">
                                        <label class="k-label k-listgroup-form-row">
                                            <span class="k-listgroup-form-field-label k-item-title"></span>
                                            <div class="k-listgroup-form-field-wrapper">
                                                <select>
                                                    <option value="Europe/London">London</option>
                                                </select>
                                            </div>
                                        </label>
                                    </li>
                                    <li class="k-item k-listgroup-item">
                                        <label class="k-label k-listgroup-form-row">
                                            <span class="k-listgroup-form-field-label k-item-title">End timezone</span>
                                            <div class="k-listgroup-form-field-wrapper">
                                                <div class="k-mobiletimezoneeditor">
                                                    <select>
                                                        <option>(GMT) Casablanca</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </label>
                                    </li>
                                    <li class="k-item k-listgroup-item k-zonepicker">
                                        <label class="k-label k-listgroup-form-row">
                                            <span class="k-listgroup-form-field-label k-item-title"></span>
                                            <div class="k-listgroup-form-field-wrapper">
                                                <select>
                                                    <option value="Atlantic/Reykjavik">Reykjavik</option>
                                                </select>
                                            </div>
                                        </label>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>

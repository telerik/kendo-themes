<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <style>
        #test-area {
            width: 700px;
        }
        .k-window {
            min-width: 400px;
            position: relative;
        }

    </style>
    <div id="test-area" class="k-d-grid k-grid-cols-1">
        <section>
            <div class="k-window" role="dialog" aria-labelledby="k-window-title-1">
                <div class="k-window-titlebar">
                    <span class="k-window-title" id="k-window-title-1">Edit event</span>
                    <div class="k-window-titlebar-actions">
                        <button class="k-window-titlebar-action k-button k-button-xs k-button-flat k-icon-button" aria-label="window-minimize">
                            <span class="k-button-icon k-icon k-svg-icon k-svg-i-window-minimize" aria-hidden="true">
                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path d="M19.931 12a.506.506 0 0 1-.506.506H4.575a.507.507 0 0 1 0-1.013h14.85a.506.506 0 0 1 .506.506z"></path>
                                </svg>
                            </span>
                        </button>
                        <button class="k-window-titlebar-action k-button k-button-xs k-button-flat k-icon-button" aria-label="window">
                            <span class="k-button-icon k-icon k-svg-icon k-svg-i-window" aria-hidden="true">
                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path d="M19.425 4.744H4.575a1.18 1.18 0 0 0-1.181 1.181v12.15a1.18 1.18 0 0 0 1.181 1.181h14.85a1.18 1.18 0 0 0 1.181-1.181V5.925a1.18 1.18 0 0 0-1.181-1.181m.169 13.331a.17.17 0 0 1-.169.169H4.575a.17.17 0 0 1-.169-.169V5.925a.17.17 0 0 1 .169-.169h14.85a.17.17 0 0 1 .169.169zM7.781 8.288a.844.844 0 1 1-.844-.844.844.844 0 0 1 .844.844m3.375 0a.844.844 0 1 1-.844-.844.844.844 0 0 1 .844.844"></path>
                                </svg>
                            </span>
                        </button>
                        <button class="k-window-titlebar-action k-button k-button-xs k-button-flat k-icon-button" aria-label="x">
                            <span class="k-button-icon k-icon k-svg-icon k-svg-i-x" aria-hidden="true">
                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path d="M18.433 17.717a.506.506 0 1 1-.715.715l-5.717-5.716-5.717 5.716a.506.506 0 0 1-.716-.715L11.284 12 5.568 6.283a.506.506 0 0 1 .716-.716l5.717 5.716 5.717-5.716a.506.506 0 0 1 .715.716L12.717 12z"></path>
                                </svg>
                            </span>
                        </button>
                    </div>
                </div>
                <div class="k-window-content">
                    <div class="k-scheduler-edit-form k-form">
                        <div class="k-form-field k-form-field-error">
                            <label class="k-form-label k-label">Title</label>
                            <div class="k-form-field-wrap">
                                <span class="k-textbox k-input k-invalid">
                                    <input aria-invalid="true" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="Invalid">
                                    <span class="k-input-validation-icon k-icon k-svg-icon k-svg-i-warning-circle" aria-hidden="true">
                                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                            <path d="M12 3.394A8.606 8.606 0 1 0 20.606 12 8.616 8.616 0 0 0 12 3.394m0 16.2A7.594 7.594 0 1 1 19.594 12 7.6 7.6 0 0 1 12 19.594m-.506-6.919V7.95a.507.507 0 0 1 1.013 0v4.725a.506.506 0 0 1-1.012 0zm1.35 3.037a.844.844 0 1 1-.844-.844.844.844 0 0 1 .844.844"></path>
                                        </svg>
                                    </span>
                                    <span class="k-clear-value">
                                        <span class="k-icon k-svg-icon k-svg-i-x" aria-hidden="true">
                                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                <path d="M18.433 17.717a.506.506 0 1 1-.715.715l-5.717-5.716-5.717 5.716a.506.506 0 0 1-.716-.715L11.284 12 5.568 6.283a.506.506 0 0 1 .716-.716l5.717 5.716 5.717-5.716a.506.506 0 0 1 .715.716L12.717 12z"></path>
                                            </svg>
                                        </span>
                                    </span>
                                </span>
                                <div class="k-form-error">Error</div>
                            </div>
                        </div>
                        <div class="k-form-field">
                            <label class="k-form-label k-label">Start</label>
                            <div class="k-form-field-wrap">
                                <span class="k-datetimepicker k-input">
                                    <input role="combobox" aria-haspopup="dialog" aria-expanded="false" aria-label="Select date and time" class="k-input-inner" placeholder="dd/MM/yyyy hh:mm AM" autocomplete="off" type="text" value="">
                                    <button class="k-input-button k-button k-icon-button" tabindex="-1" aria-label="Select date and time">
                                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-calendar" aria-hidden="true">
                                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                <path d="M18.75 4.069h-2.194v-.844a.507.507 0 0 0-1.013 0v.844H8.456v-.844a.507.507 0 0 0-1.013 0v.844H5.249A1.18 1.18 0 0 0 4.068 5.25v13.5a1.18 1.18 0 0 0 1.181 1.181h13.5a1.18 1.18 0 0 0 1.181-1.181V5.25a1.18 1.18 0 0 0-1.181-1.181zM5.25 5.081h2.194v.844a.507.507 0 0 0 1.013 0v-.844h7.087v.844a.506.506 0 0 0 1.012 0v-.844h2.194a.17.17 0 0 1 .169.169v2.869H5.081V5.25a.17.17 0 0 1 .169-.169m13.5 13.838H5.25a.17.17 0 0 1-.169-.169V9.131h13.837v9.619a.17.17 0 0 1-.169.169zm-5.569-4.894A1.181 1.181 0 1 1 12 12.844a1.18 1.18 0 0 1 1.181 1.181"></path>
                                            </svg>
                                        </span>
                                    </button>
                                </span>
                            </div>
                        </div>
                        <div class="k-form-field">
                            <label class="k-form-label k-label">End</label>
                            <div class="k-form-field-wrap">
                                <span class="k-datetimepicker k-input">
                                    <input role="combobox" aria-haspopup="dialog" aria-expanded="false" aria-label="Select date and time" class="k-input-inner" placeholder="dd/MM/yyyy hh:mm AM" autocomplete="off" type="text" value="">
                                    <button class="k-input-button k-button k-icon-button" tabindex="-1" aria-label="Select date and time">
                                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-calendar" aria-hidden="true">
                                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                <path d="M18.75 4.069h-2.194v-.844a.507.507 0 0 0-1.013 0v.844H8.456v-.844a.507.507 0 0 0-1.013 0v.844H5.249A1.18 1.18 0 0 0 4.068 5.25v13.5a1.18 1.18 0 0 0 1.181 1.181h13.5a1.18 1.18 0 0 0 1.181-1.181V5.25a1.18 1.18 0 0 0-1.181-1.181zM5.25 5.081h2.194v.844a.507.507 0 0 0 1.013 0v-.844h7.087v.844a.506.506 0 0 0 1.012 0v-.844h2.194a.17.17 0 0 1 .169.169v2.869H5.081V5.25a.17.17 0 0 1 .169-.169m13.5 13.838H5.25a.17.17 0 0 1-.169-.169V9.131h13.837v9.619a.17.17 0 0 1-.169.169zm-5.569-4.894A1.181 1.181 0 1 1 12 12.844a1.18 1.18 0 0 1 1.181 1.181"></path>
                                            </svg>
                                        </span>
                                    </button>
                                </span>
                            </div>
                        </div>
                        <div class="k-form-field">
                            <div class="k-form-field-wrap">
                                <span class="k-checkbox-wrap">
                                    <input class="k-checkbox" type="checkbox">
                                </span>
                                <label class="k-checkbox-label">All Day Event</label>
                            </div>
                        </div>
                        <div class="k-form-field">
                            <div class="k-form-field-wrap">
                                <span class="k-checkbox-wrap">
                                    <input class="k-checkbox" type="checkbox">
                                </span>
                                <label class="k-checkbox-label">Specify Time Zone</label>
                            </div>
                        </div>
                        <div class="k-recurrence-editor">
                            <div class="k-form-field">
                                <label class="k-form-label k-label">Repeat</label>
                                <div class="k-form-field-wrap">
                                    <div role="group" class="k-scheduler-recurrence-repeat k-button-group k-button-group-stretched">
                                        <button class="k-group-start k-button">
                                            <span class="k-button-text">Never</span>
                                        </button>
                                        <button class="k-button k-selected">
                                            <span class="k-button-text">Daily</span>
                                        </button>
                                        <button class="k-button">
                                            <span class="k-button-text">Weekly</span>
                                        </button>
                                        <button class="k-button">
                                            <span class="k-button-text">Monthly</span>
                                        </button>
                                        <button class="k-group-end k-button">
                                            <span class="k-button-text">Yearly</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="k-recur-view">
                                <div class="k-scheduler-recurrence-interval-editor">
                                    <div class="k-form-field">
                                        <label class="k-form-label k-label">Repeat every</label>
                                        <div class="k-form-field-wrap">
                                            <span class="k-recur-interval k-numerictextbox k-input">
                                                <input role="spinbutton" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
                                                <span class="k-spin-button k-input-spinner">
                                                    <button class="k-spinner-increase k-button k-icon-button" aria-label="Increase value">
                                                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-up" aria-hidden="true">
                                                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                                <path d="M19.108 15.058a.506.506 0 0 1-.715 0l-6.392-6.391-6.392 6.391a.506.506 0 0 1-.716-.716l6.75-6.75a.506.506 0 0 1 .716 0l6.75 6.75a.506.506 0 0 1 0 .716z"></path>
                                                            </svg>
                                                        </span>
                                                    </button>
                                                    <button class="k-spinner-decrease k-button k-icon-button" aria-label="Decrease value">
                                                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-down" aria-hidden="true">
                                                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                                <path d="m19.108 9.658-6.75 6.75a.506.506 0 0 1-.716 0l-6.75-6.75a.506.506 0 0 1 .716-.716L12 15.333l6.392-6.391a.506.506 0 0 1 .715.715z"></path>
                                                            </svg>
                                                        </span>
                                                    </button>
                                                </span>
                                            </span>
                                            <span> day(s)</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="k-scheduler-recurrence-end-rule-editor">
                                    <div class="k-form-field">
                                        <label class="k-form-label k-label">End</label>
                                        <div class="k-form-field-wrap">
                                            <ul class="k-radio-list k-list-vertical" role="radiogroup">
                                                <li class="k-radio-list-item" role="none">
                                                    <span class="k-radio-wrap">
                                                        <input id="k-endrule-never" class="k-radio" type="radio">
                                                    </span>
                                                    <label class="k-radio-label" for="k-endrule-never">Never</label>
                                                </li>
                                                <li class="k-radio-list-item" role="none">
                                                    <span class="k-radio-wrap">
                                                        <input id="k-endrule-count" class="k-radio" type="radio">
                                                    </span>
                                                    <label class="k-radio-label" for="k-endrule-count">After</label>
                                                    <span class="k-recur-count k-numerictextbox k-input">
                                                        <input role="spinbutton" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
                                                        <span class="k-spin-button k-input-spinner">
                                                            <button class="k-spinner-increase k-button k-icon-button" aria-label="Increase value">
                                                                <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-up" aria-hidden="true">
                                                                    <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                                        <path d="M19.108 15.058a.506.506 0 0 1-.715 0l-6.392-6.391-6.392 6.391a.506.506 0 0 1-.716-.716l6.75-6.75a.506.506 0 0 1 .716 0l6.75 6.75a.506.506 0 0 1 0 .716z"></path>
                                                                    </svg>
                                                                </span>
                                                            </button>
                                                            <button class="k-spinner-decrease k-button k-icon-button" aria-label="Decrease value">
                                                                <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-down" aria-hidden="true">
                                                                    <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                                        <path d="m19.108 9.658-6.75 6.75a.506.506 0 0 1-.716 0l-6.75-6.75a.506.506 0 0 1 .716-.716L12 15.333l6.392-6.391a.506.506 0 0 1 .715.715z"></path>
                                                                    </svg>
                                                                </span>
                                                            </button>
                                                        </span>
                                                    </span>
                                                    <span>occurrence(s)</span>
                                                </li>
                                                <li class="k-radio-list-item" role="none">
                                                    <span class="k-radio-wrap">
                                                        <input id="k-endrule-until" class="k-radio" type="radio">
                                                    </span>
                                                    <label class="k-radio-label" for="k-endrule-until">On</label>
                                                    <span class="k-recur-until k-datepicker k-input k-disabled">
                                                        <input role="combobox" aria-haspopup="grid" aria-expanded="false" aria-label="Select date" class="k-input-inner" placeholder="" autocomplete="off" disabled="" type="text" value="">
                                                        <button class="k-input-button k-button k-disabled k-icon-button" tabindex="-1" aria-label="Select date" disabled="">
                                                            <span class="k-button-icon k-icon k-svg-icon k-svg-i-calendar" aria-hidden="true">
                                                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                                    <path d="M18.75 4.069h-2.194v-.844a.507.507 0 0 0-1.013 0v.844H8.456v-.844a.507.507 0 0 0-1.013 0v.844H5.249A1.18 1.18 0 0 0 4.068 5.25v13.5a1.18 1.18 0 0 0 1.181 1.181h13.5a1.18 1.18 0 0 0 1.181-1.181V5.25a1.18 1.18 0 0 0-1.181-1.181zM5.25 5.081h2.194v.844a.507.507 0 0 0 1.013 0v-.844h7.087v.844a.506.506 0 0 0 1.012 0v-.844h2.194a.17.17 0 0 1 .169.169v2.869H5.081V5.25a.17.17 0 0 1 .169-.169m13.5 13.838H5.25a.17.17 0 0 1-.169-.169V9.131h13.837v9.619a.17.17 0 0 1-.169.169zm-5.569-4.894A1.181 1.181 0 1 1 12 12.844a1.18 1.18 0 0 1 1.181 1.181"></path>
                                                                </svg>
                                                            </span>
                                                        </button>
                                                    </span>
                                                </li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="k-form-field">
                            <label class="k-form-label k-label">Description</label>
                            <div class="k-form-field-wrap">
                                <span class="k-textarea !k-flex-col k-input">
                                    <textarea class="!k-overflow-auto !k-flex-none k-resize k-input-inner" placeholder=""></textarea>
                                </span>
                            </div>
                        </div>
                        <div class="k-form-field">
                            <label class="k-form-label k-label">Owner</label>
                            <div class="k-form-field-wrap">
                                <span class="k-combobox k-input">
                                    <input role="combobox" aria-haspopup="listbox" aria-expanded="false" class="k-input-inner" placeholder="Select owner" autocomplete="off" type="text" value="">
                                    <button class="k-input-button k-button k-icon-button" aria-label="Open popup" tabindex="-1">
                                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-down" aria-hidden="true">
                                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                <path d="m19.108 9.658-6.75 6.75a.506.506 0 0 1-.716 0l-6.75-6.75a.506.506 0 0 1 .716-.716L12 15.333l6.392-6.391a.506.506 0 0 1 .715.715z"></path>
                                            </svg>
                                        </span>
                                    </button>
                                </span>
                            </div>
                        </div>
                        <div class="k-form-field">
                            <label class="k-form-label k-label">Atendee<span class="k-label-optional">(Optional)</span>
                            </label>
                            <div class="k-form-field-wrap">
                                <span class="k-multiselect k-input">
                                    <div class="k-input-values">
                                        <div class="k-chip-list" role="listbox" aria-label="chip list" aria-orientation="horizontal"></div>
                                        <input role="combobox" aria-haspopup="listbox" aria-expanded="false" aria-autocomplete="list" class="k-input-inner" placeholder="Invite people" autocomplete="off" type="text" value="">
                                    </div>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="k-actions k-actions-start k-actions-horizontal k-window-actions">
                    <button class="k-button k-button-primary">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-save" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="m19.585 7.395-2.98-2.98a1.17 1.17 0 0 0-.834-.346H5.25A1.18 1.18 0 0 0 4.069 5.25v13.5a1.18 1.18 0 0 0 1.181 1.181h13.5a1.18 1.18 0 0 0 1.181-1.181V8.229a1.17 1.17 0 0 0-.346-.834m-4.042 11.524H8.455v-4.894a.17.17 0 0 1 .169-.169h6.75a.17.17 0 0 1 .169.169zm3.375-.169a.17.17 0 0 1-.169.169h-2.194v-4.894a1.18 1.18 0 0 0-1.181-1.181h-6.75a1.18 1.18 0 0 0-1.181 1.181v4.894H5.249a.17.17 0 0 1-.169-.169V5.25a.17.17 0 0 1 .169-.169H15.77a.17.17 0 0 1 .119.049l2.98 2.98a.17.17 0 0 1 .049.119zM14.531 7.275a.506.506 0 0 1-.506.506H9.3a.507.507 0 0 1 0-1.013h4.725a.506.506 0 0 1 .506.506z"></path>
                            </svg>
                        </span>
                        <span class="k-button-text">Save</span>
                    </button>
                    <button class="k-button">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-cancel" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M15.058 14.342a.506.506 0 1 1-.716.716l-5.4-5.4a.506.506 0 0 1 .716-.716zM20.606 12A8.606 8.606 0 1 1 12 3.394 8.616 8.616 0 0 1 20.606 12m-1.012 0A7.594 7.594 0 1 0 12 19.594 7.6 7.6 0 0 0 19.594 12"></path>
                            </svg>
                        </span>
                        <span class="k-button-text">Cancel</span>
                    </button>
                    <span class="k-spacer"></span>
                    <button class="k-button k-button-flat k-button-primary">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-trash" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M19.425 5.419h-3.544v-.844a1.856 1.856 0 0 0-1.856-1.856h-4.05a1.856 1.856 0 0 0-1.856 1.856v.844H4.575a.507.507 0 0 0 0 1.013h.844v12.319A1.18 1.18 0 0 0 6.6 19.932h10.8a1.18 1.18 0 0 0 1.181-1.181V6.432h.844a.507.507 0 0 0 0-1.013M9.131 4.575a.844.844 0 0 1 .844-.844h4.05a.844.844 0 0 1 .844.844v.844H9.131zm8.438 14.175a.17.17 0 0 1-.169.169H6.6a.17.17 0 0 1-.169-.169V6.431h11.138zm-7.088-8.775v5.4a.506.506 0 0 1-1.012 0v-5.4a.506.506 0 0 1 1.012 0m4.05 0v5.4a.506.506 0 0 1-1.012 0v-5.4a.506.506 0 0 1 1.012 0"></path>
                            </svg>
                        </span>
                        <span class="k-button-text">Delete</span>
                    </button>
                </div>
            </div>
        </section>
    </div>
</body>
</html>

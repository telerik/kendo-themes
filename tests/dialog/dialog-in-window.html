<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">

<body id="app" class="k-body">
    <style>
        #test-area {
            width: 500px;
            transform: translate(0, 0);
        }
        .k-window {
            width: 100%;
            height: 400px;
            position: relative;
        }
        .k-dialog {
            width: 300px;
            height: 200px;
        }

    </style>
    <div id="test-area" class="k-d-grid k-grid-cols-1">
        <section>
            <div class="k-window-wrapper k-window" role="dialog" aria-labelledby="k-window-title-1">

                    <span class="k-window-title" id="k-window-title-1">Window with dialog</span>
                    <div class="k-window-titlebar-actions">
                        <button class="k-window-titlebar-action k-button k-button-xs k-button-flat k-icon-button" aria-label="window-minimize">

                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path d="M21.517 12a.607.607 0 0 1-.607.607H3.09a.608.608 0 0 1 0-1.215h17.82a.607.607 0 0 1 .607.607z"></path>
                                </svg>
                            </span>

                                </svg>
                            </span>
                        </button>
                        <button class="k-window-titlebar-action k-button k-button-xs k-button-flat k-icon-button" aria-label="x">
                            <span class="k-button-icon k-icon k-svg-icon k-svg-i-x" aria-hidden="true">
                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path d="M19.72 18.86a.607.607 0 1 1-.858.858l-6.861-6.859-6.86 6.859a.607.607 0 0 1-.859-.858L11.141 12 4.282 5.14a.607.607 0 0 1 .859-.86l6.86 6.86 6.861-6.86a.607.607 0 0 1 .858.86L12.86 12z"></path>

                            </span>

                    </div>
                </div>
                <div class="k-window-content">Window content<div class="k-dialog-wrapper">
                        <div class="k-overlay"></div>
                        <div class="k-dialog k-window" role="dialog" aria-labelledby="k-dialog-titlebar-1" aria-describedby="k-dialog-content-1" aria-modal="true">

                                        </span>
                                    </button>
                                </div>
                            </div>
                            <div class="k-window-content k-dialog-content" id="k-dialog-content-1">Dialog content</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

</html>

<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <div id="test-area" class="k-d-grid k-grid-cols-1">
        <h4>Image Editor Resize Pane</h4>
        <div class="k-imageeditor">
            <div class="k-imageeditor-header">
                <div class="k-imageeditor-toolbar k-toolbar" role="toolbar" aria-label="Toolbar">
                    <button class="k-toolbar-button  k-button k-icon-button" aria-label="Upload">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-upload" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M23.137 12.81v6.48a1.416 1.416 0 0 1-1.417 1.417H2.28A1.416 1.416 0 0 1 .863 19.29v-6.48a1.416 1.416 0 0 1 1.417-1.417h4.86a.608.608 0 0 1 0 1.215H2.28a.204.204 0 0 0-.203.203v6.48a.204.204 0 0 0 .203.203h19.44a.204.204 0 0 0 .203-.203v-6.48a.204.204 0 0 0-.203-.203h-4.86a.607.607 0 0 1 0-1.214h4.86a1.416 1.416 0 0 1 1.417 1.417zM7.568 6.76l3.824-3.822V12a.608.608 0 0 0 1.215 0V2.938L16.43 6.76a.607.607 0 0 0 .86-.86l-4.86-4.86a.607.607 0 0 0-.86 0L6.71 5.9a.607.607 0 0 0 .86.86zm11.519 9.29a1.013 1.013 0 1 0-1.013 1.013 1.013 1.013 0 0 0 1.013-1.013"></path>
                            </svg>
                        </span>
                    </button>
                    <button class="k-toolbar-button  k-button k-icon-button" aria-label="Download">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-download" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M21.517 13.62v6.48a.607.607 0 0 1-.607.607H3.09a.607.607 0 0 1-.607-.607v-6.48a.608.608 0 0 1 1.215 0v5.873h16.606V13.62a.607.607 0 0 1 1.214 0zm-9.947.43a.607.607 0 0 0 .86 0L16.48 10a.607.607 0 0 0-.86-.86l-3.013 3.012V2.28a.608.608 0 0 0-1.215 0v9.872L8.378 9.14a.607.607 0 0 0-.859.86z"></path>
                            </svg>
                        </span>
                    </button>
                    <div class="k-toolbar-separator k-separator"></div>
                    <button class="k-toolbar-button  k-button k-disabled k-icon-button" aria-label="Undo" disabled="">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-undo" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M21.517 12a9.516 9.516 0 0 1-9.39 9.517H12a9.46 9.46 0 0 1-6.53-2.597.607.607 0 1 1 .834-.883 8.303 8.303 0 1 0-.177-11.91l-.019.019-3.074 2.816H6.33a.607.607 0 0 1 0 1.214H1.47a.607.607 0 0 1-.607-.607v-4.86a.608.608 0 0 1 1.215 0v3.476l3.203-2.93a9.517 9.517 0 0 1 16.237 6.743z"></path>
                            </svg>
                        </span>
                    </button>
                    <button class="k-toolbar-button  k-button k-disabled k-icon-button" aria-label="Redo" disabled="">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-redo" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="m22.15 10-4.86 4.86a.607.607 0 0 1-.86-.86l3.822-3.823H12a9.12 9.12 0 0 0-9.113 9.113.608.608 0 0 1-1.215 0A10.34 10.34 0 0 1 11.999 8.963h8.252L16.429 5.14a.607.607 0 0 1 .859-.86l4.86 4.86a.607.607 0 0 1 0 .858z"></path>
                            </svg>
                        </span>
                    </button>
                    <div class="k-toolbar-separator k-separator"></div>
                    <button class="k-toolbar-button  k-button k-icon-button" aria-label="Crop">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-crop" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M23.137 18.48a.607.607 0 0 1-.607.607h-3.443v3.443a.607.607 0 0 1-1.214 0v-3.443H5.52a.607.607 0 0 1-.607-.607V6.127H1.47a.608.608 0 0 1 0-1.215h3.443V1.469a.608.608 0 0 1 1.215 0v16.403h16.403a.607.607 0 0 1 .607.607zM8.76 6.127h9.113v9.113a.607.607 0 0 0 1.214 0V5.52a.607.607 0 0 0-.607-.607H8.76a.608.608 0 0 0 0 1.215z"></path>
                            </svg>
                        </span>
                    </button>
                    <button class="k-toolbar-button  k-button k-icon-button" aria-label="Resize">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-image-resize" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M20.707 3.9v4.86a.607.607 0 0 1-1.214 0V5.366L14.05 10.81a.607.607 0 0 1-.86-.86l5.444-5.443H15.24a.608.608 0 0 1 0-1.215h4.86a.607.607 0 0 1 .607.607zM9.95 13.19l-5.443 5.444V15.24a.608.608 0 0 0-1.215 0v4.86a.607.607 0 0 0 .607.607h4.86a.607.607 0 0 0 0-1.214H5.365l5.443-5.443a.607.607 0 0 0-.859-.86z"></path>
                            </svg>
                        </span>
                    </button>
                    <button class="k-toolbar-button  k-button k-icon-button" aria-label="Zoom in">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-zoom-in" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M14.227 10.38a.607.607 0 0 1-.607.607h-2.633v2.633a.607.607 0 0 1-1.214 0v-2.633H7.14a.607.607 0 0 1 0-1.214h2.633V7.14a.608.608 0 0 1 1.215 0v2.633h2.633a.607.607 0 0 1 .607.607zm7.923 11.77a.607.607 0 0 1-.858 0l-5.202-5.202a8.723 8.723 0 1 1 .859-.86l5.202 5.202a.607.607 0 0 1 0 .858zm-11.77-4.277a7.493 7.493 0 1 0-7.493-7.493 7.5 7.5 0 0 0 7.493 7.493"></path>
                            </svg>
                        </span>
                    </button>
                    <button class="k-toolbar-button  k-button k-icon-button" aria-label="Zoom out">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-zoom-out" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M14.227 10.38a.607.607 0 0 1-.607.607H7.14a.607.607 0 0 1 0-1.214h6.48a.607.607 0 0 1 .607.607m7.923 11.77a.607.607 0 0 1-.858 0l-5.202-5.202a8.723 8.723 0 1 1 .859-.86l5.202 5.202a.607.607 0 0 1 0 .858zm-11.77-4.277a7.493 7.493 0 1 0-7.493-7.493 7.5 7.5 0 0 0 7.493 7.493"></path>
                            </svg>
                        </span>
                    </button>
                    <div class="k-toolbar-item">
                        <span class="k-dropdownlist k-picker" role="combobox" aria-haspopup="listbox" aria-expanded="false" aria-label="Zoom options" tabindex="0">
                            <span class="k-input-inner">
                                <span class="k-input-value-text">Zoom options</span>
                            </span>
                            <button class="k-input-button k-button k-icon-button" aria-label="Toggle dropdown" tabindex="-1">
                                <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-down" aria-hidden="true">
                                    <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                        <path d="m20.53 9.19-8.1 8.1a.607.607 0 0 1-.86 0l-8.1-8.1a.607.607 0 0 1 .86-.86L12 16l7.67-7.67a.607.607 0 0 1 .858.858z"></path>
                                    </svg>
                                </span>
                            </button>
                        </span>
                    </div>
                </div>
            </div>
            <div class="k-imageeditor-content" style="height: 482px;">
                <div class="k-imageeditor-canvas-container">
                    <div class="k-imageeditor-canvas">
                        <canvas width="61" height="68" role="img" aria-label="Image being edited"></canvas>
                    </div>
                </div>
                <div class="k-imageeditor-action-pane">
                    <div class="k-imageeditor-pane-form k-form">
                        <fieldset class="k-form-fieldset">
                            <legend class="k-form-legend">Resize Image</legend>
                            <div class="k-form-layout k-d-grid k-grid-cols-2" style="column-gap: 8px;">
                                <div class="k-form-field k-col-span-1">
                                    <label class="k-form-label k-label" id="resize-width-label" for="resize-width">Width:</label>
                                    <div class="k-form-field-wrap">
                                        <span class="k-numerictextbox k-input">
                                            <input id="resize-width" role="spinbutton" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="61">
                                            <span class="k-spin-button k-input-spinner">
                                                <button class="k-spinner-increase k-button k-icon-button" aria-label="Increase value">
                                                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-up" aria-hidden="true">
                                                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                            <path d="M20.53 15.67a.607.607 0 0 1-.858 0L12.001 8l-7.67 7.67a.607.607 0 0 1-.859-.86l8.1-8.1a.607.607 0 0 1 .859 0l8.1 8.1a.607.607 0 0 1 0 .86z"></path>
                                                        </svg>
                                                    </span>
                                                </button>
                                                <button class="k-spinner-decrease k-button k-icon-button" aria-label="Decrease value">
                                                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-down" aria-hidden="true">
                                                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                            <path d="m20.53 9.19-8.1 8.1a.607.607 0 0 1-.86 0l-8.1-8.1a.607.607 0 0 1 .86-.86L12 16l7.67-7.67a.607.607 0 0 1 .858.858z"></path>
                                                        </svg>
                                                    </span>
                                                </button>
                                            </span>
                                        </span>
                                    </div>
                                </div>
                                <div class="k-form-field k-col-span-1">
                                    <label class="k-form-label k-label">&nbsp;</label>
                                    <div class="k-form-field-wrap">
                                        <span class="k-dropdownlist k-picker" role="combobox" aria-haspopup="listbox" aria-expanded="false" aria-label="Width unit" tabindex="0">
                                            <span class="k-input-inner">
                                                <span class="k-input-value-text">Pixels</span>
                                            </span>
                                            <button class="k-input-button k-button k-icon-button" aria-label="Toggle dropdown" tabindex="-1">
                                                <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-down" aria-hidden="true">
                                                    <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                        <path d="m20.53 9.19-8.1 8.1a.607.607 0 0 1-.86 0l-8.1-8.1a.607.607 0 0 1 .86-.86L12 16l7.67-7.67a.607.607 0 0 1 .858.858z"></path>
                                                    </svg>
                                                </span>
                                            </button>
                                        </span>
                                    </div>
                                </div>
                                <div class="k-form-field k-col-span-1">
                                    <label class="k-form-label k-label" id="resize-height-label" for="resize-height">Height:</label>
                                    <div class="k-form-field-wrap">
                                        <span class="k-numerictextbox k-input">
                                            <input id="resize-height" role="spinbutton" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="68">
                                            <span class="k-spin-button k-input-spinner">
                                                <button class="k-spinner-increase k-button k-icon-button" aria-label="Increase value">
                                                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-up" aria-hidden="true">
                                                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                            <path d="M20.53 15.67a.607.607 0 0 1-.858 0L12.001 8l-7.67 7.67a.607.607 0 0 1-.859-.86l8.1-8.1a.607.607 0 0 1 .859 0l8.1 8.1a.607.607 0 0 1 0 .86z"></path>
                                                        </svg>
                                                    </span>
                                                </button>
                                                <button class="k-spinner-decrease k-button k-icon-button" aria-label="Decrease value">
                                                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-down" aria-hidden="true">
                                                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                            <path d="m20.53 9.19-8.1 8.1a.607.607 0 0 1-.86 0l-8.1-8.1a.607.607 0 0 1 .86-.86L12 16l7.67-7.67a.607.607 0 0 1 .858.858z"></path>
                                                        </svg>
                                                    </span>
                                                </button>
                                            </span>
                                        </span>
                                    </div>
                                </div>
                                <div class="k-form-field k-col-span-1">
                                    <label class="k-form-label k-label">&nbsp;</label>
                                    <div class="k-form-field-wrap">
                                        <span class="k-dropdownlist k-picker" role="combobox" aria-haspopup="listbox" aria-expanded="false" aria-label="Height unit" tabindex="0">
                                            <span class="k-input-inner">
                                                <span class="k-input-value-text">Pixels</span>
                                            </span>
                                            <button class="k-input-button k-button k-icon-button" aria-label="Toggle dropdown" tabindex="-1">
                                                <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-down" aria-hidden="true">
                                                    <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                        <path d="m20.53 9.19-8.1 8.1a.607.607 0 0 1-.86 0l-8.1-8.1a.607.607 0 0 1 .86-.86L12 16l7.67-7.67a.607.607 0 0 1 .858.858z"></path>
                                                    </svg>
                                                </span>
                                            </button>
                                        </span>
                                    </div>
                                </div>
                                <div class="k-form-field k-col-span-2">
                                    <div class="k-form-field-wrap">
                                        <span class="k-checkbox-wrap">
                                            <input id="resize-lock" class="k-checkbox" type="checkbox">
                                        </span>
                                        <label class="k-checkbox-label" for="resize-lock">Lock aspect ratio</label>
                                    </div>
                                </div>
                            </div>
                        </fieldset>
                        <div class="k-form-buttons">
                            <button class="k-button k-button-primary">
                                <span class="k-button-icon k-icon k-svg-icon k-svg-i-check" aria-hidden="true">
                                    <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                        <path d="M22.15 6.76 9.19 19.72a.607.607 0 0 1-.86 0l-5.67-5.67a.607.607 0 0 1 .86-.86l5.24 5.24L21.29 5.9a.607.607 0 0 1 .858.86z"></path>
                                    </svg>
                                </span>
                                <span class="k-button-text">Confirm</span>
                            </button>
                            <button class="k-button">
                                <span class="k-button-icon k-icon k-svg-icon k-svg-i-cancel" aria-hidden="true">
                                    <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                        <path d="M15.67 14.81a.607.607 0 1 1-.86.86L8.33 9.19a.607.607 0 0 1 .86-.86zM22.327 12A10.327 10.327 0 1 1 12 1.673 10.34 10.34 0 0 1 22.327 12m-1.214 0A9.113 9.113 0 1 0 12 21.113 9.12 9.12 0 0 0 21.113 12"></path>
                                    </svg>
                                </span>
                                <span class="k-button-text">Cancel</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

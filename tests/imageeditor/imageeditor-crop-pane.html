<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <div id="test-area" class="k-d-grid k-grid-cols-1">
        <h4>Image Editor Crop Pane</h4>
        <div class="k-imageeditor">
            <div class="k-imageeditor-header">
                <div class="k-imageeditor-toolbar k-toolbar" role="toolbar" aria-label="Toolbar">
                    <button class="k-toolbar-button  k-button k-icon-button" aria-label="Upload">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-upload" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M21.281 12.675v5.4a1.18 1.18 0 0 1-1.181 1.181H3.9a1.18 1.18 0 0 1-1.181-1.181v-5.4A1.18 1.18 0 0 1 3.9 11.494h4.05a.507.507 0 0 1 0 1.013H3.9a.17.17 0 0 0-.169.169v5.4a.17.17 0 0 0 .169.169h16.2a.17.17 0 0 0 .169-.169v-5.4a.17.17 0 0 0-.169-.169h-4.05a.506.506 0 0 1 0-1.012h4.05a1.18 1.18 0 0 1 1.181 1.181zM8.307 7.633l3.186-3.185V12a.507.507 0 0 0 1.013 0V4.448l3.186 3.185a.506.506 0 0 0 .716-.716l-4.05-4.05a.506.506 0 0 0-.716 0l-4.05 4.05a.506.506 0 0 0 .716.716zm9.599 7.742a.844.844 0 1 0-.844.844.844.844 0 0 0 .844-.844"></path>
                            </svg>
                        </span>
                    </button>
                    <button class="k-toolbar-button  k-button k-icon-button" aria-label="Download">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-download" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M19.931 13.35v5.4a.506.506 0 0 1-.506.506H4.575a.506.506 0 0 1-.506-.506v-5.4a.507.507 0 0 1 1.013 0v4.894H18.92V13.35a.506.506 0 0 1 1.012 0zm-8.289.358a.506.506 0 0 0 .716 0l3.375-3.375a.506.506 0 0 0-.716-.716l-2.511 2.51V3.9a.507.507 0 0 0-1.013 0v8.227l-2.511-2.51a.506.506 0 0 0-.716.716z"></path>
                            </svg>
                        </span>
                    </button>
                    <div class="k-toolbar-separator k-separator"></div>
                    <button class="k-toolbar-button  k-button k-disabled k-icon-button" aria-label="Undo" disabled="">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-undo" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M19.931 12a7.93 7.93 0 0 1-7.825 7.931H12a7.88 7.88 0 0 1-5.442-2.164.506.506 0 1 1 .695-.736 6.919 6.919 0 1 0-.147-9.925l-.016.016-2.562 2.346h2.747a.506.506 0 0 1 0 1.012h-4.05a.506.506 0 0 1-.506-.506v-4.05a.507.507 0 0 1 1.013 0v2.897l2.669-2.442a7.931 7.931 0 0 1 13.531 5.619z"></path>
                            </svg>
                        </span>
                    </button>
                    <button class="k-toolbar-button  k-button k-disabled k-icon-button" aria-label="Redo" disabled="">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-redo" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="m20.458 10.333-4.05 4.05a.506.506 0 0 1-.716-.716l3.185-3.186H12a7.6 7.6 0 0 0-7.594 7.594.507.507 0 0 1-1.013 0 8.616 8.616 0 0 1 8.606-8.606h6.877l-3.185-3.186a.506.506 0 0 1 .716-.716l4.05 4.05a.506.506 0 0 1 0 .715z"></path>
                            </svg>
                        </span>
                    </button>
                    <div class="k-toolbar-separator k-separator"></div>
                    <button class="k-toolbar-button  k-button k-icon-button" aria-label="Crop">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-crop" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M21.281 17.4a.506.506 0 0 1-.506.506h-2.869v2.869a.506.506 0 0 1-1.012 0v-2.869H6.6a.506.506 0 0 1-.506-.506V7.106H3.225a.507.507 0 0 1 0-1.013h2.869V3.224a.507.507 0 0 1 1.013 0v13.669h13.669a.506.506 0 0 1 .506.506zM9.3 7.106h7.594V14.7a.506.506 0 0 0 1.012 0V6.6a.506.506 0 0 0-.506-.506H9.3a.507.507 0 0 0 0 1.013z"></path>
                            </svg>
                        </span>
                    </button>
                    <button class="k-toolbar-button  k-button k-icon-button" aria-label="Resize">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-image-resize" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M19.256 5.25V9.3a.506.506 0 0 1-1.012 0V6.472l-4.536 4.536a.506.506 0 0 1-.716-.716l4.536-4.536H14.7a.507.507 0 0 1 0-1.013h4.05a.506.506 0 0 1 .506.506zm-8.964 7.742-4.536 4.536V14.7a.507.507 0 0 0-1.013 0v4.05a.506.506 0 0 0 .506.506h4.05a.506.506 0 0 0 0-1.012H6.471l4.536-4.536a.506.506 0 0 0-.716-.716z"></path>
                            </svg>
                        </span>
                    </button>
                    <button class="k-toolbar-button  k-button k-icon-button" aria-label="Zoom in">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-zoom-in" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M13.856 10.65a.506.506 0 0 1-.506.506h-2.194v2.194a.506.506 0 0 1-1.012 0v-2.194H7.95a.506.506 0 0 1 0-1.012h2.194V7.95a.507.507 0 0 1 1.013 0v2.194h2.194a.506.506 0 0 1 .506.506zm6.602 9.808a.506.506 0 0 1-.715 0l-4.335-4.335a7.269 7.269 0 1 1 .716-.716l4.335 4.335a.506.506 0 0 1 0 .715zm-9.808-3.564a6.244 6.244 0 1 0-6.244-6.244 6.25 6.25 0 0 0 6.244 6.244"></path>
                            </svg>
                        </span>
                    </button>
                    <button class="k-toolbar-button  k-button k-icon-button" aria-label="Zoom out">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-zoom-out" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M13.856 10.65a.506.506 0 0 1-.506.506h-5.4a.506.506 0 0 1 0-1.012h5.4a.506.506 0 0 1 .506.506m6.602 9.808a.506.506 0 0 1-.715 0l-4.335-4.335a7.269 7.269 0 1 1 .716-.716l4.335 4.335a.506.506 0 0 1 0 .715zm-9.808-3.564a6.244 6.244 0 1 0-6.244-6.244 6.25 6.25 0 0 0 6.244 6.244"></path>
                            </svg>
                        </span>
                    </button>
                    <div class="k-toolbar-item">
                        <span class="k-dropdownlist k-picker" role="combobox" aria-haspopup="listbox" aria-expanded="false" aria-label="Zoom options" tabindex="0">
                            <span class="k-input-inner">
                                <span class="k-input-value-text">Zoom options</span>
                            </span>
                            <button class="k-input-button k-button k-icon-button" aria-label="Toggle dropdown" tabindex="-1">
                                <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-down" aria-hidden="true">
                                    <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                        <path d="m19.108 9.658-6.75 6.75a.506.506 0 0 1-.716 0l-6.75-6.75a.506.506 0 0 1 .716-.716L12 15.333l6.392-6.391a.506.506 0 0 1 .715.715z"></path>
                                    </svg>
                                </span>
                            </button>
                        </span>
                    </div>
                </div>
            </div>
            <div class="k-imageeditor-content" style="height: 482px;">
                <div class="k-imageeditor-canvas-container">
                    <div class="k-imageeditor-canvas">
                        <canvas width="700" height="400" style="background-image: url(&quot;/packages/html/assets/sofia.jpg&quot;); background-position: 50px -350px;"></canvas>
                        <div class="k-imageeditor-crop-overlay">
                            <div class="k-imageeditor-crop" style="width: 400px; height: 400px; background-image: url(&quot;/packages/html/assets/sofia.jpg&quot;); background-clip: content-box; background-position: 748px -350px;">
                                <span class="k-resize-handle k-resize-nw"></span>
                                <span class="k-resize-handle k-resize-n"></span>
                                <span class="k-resize-handle k-resize-ne"></span>
                                <span class="k-resize-handle k-resize-w"></span>
                                <span class="k-resize-handle k-resize-e"></span>
                                <span class="k-resize-handle k-resize-sw"></span>
                                <span class="k-resize-handle k-resize-s"></span>
                                <span class="k-resize-handle k-resize-se"></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="k-imageeditor-action-pane">
                    <div class="k-imageeditor-pane-form k-form">
                        <fieldset class="k-form-fieldset">
                            <legend class="k-form-legend">Crop Image</legend>
                            <div class="k-form-layout k-d-grid k-grid-cols-2" style="column-gap: 8px;">
                                <div class="k-form-field k-col-span-2">
                                    <label class="k-form-label k-label">Aspect Ratio:</label>
                                    <div class="k-form-field-wrap">
                                        <span class="k-dropdownlist k-picker" role="combobox" aria-haspopup="listbox" aria-expanded="false" aria-label="Aspect ratio" tabindex="0">
                                            <span class="k-input-inner">
                                                <span class="k-input-value-text">Original ratio</span>
                                            </span>
                                            <button class="k-input-button k-button k-icon-button" aria-label="Toggle dropdown" tabindex="-1">
                                                <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-down" aria-hidden="true">
                                                    <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                        <path d="m19.108 9.658-6.75 6.75a.506.506 0 0 1-.716 0l-6.75-6.75a.506.506 0 0 1 .716-.716L12 15.333l6.392-6.391a.506.506 0 0 1 .715.715z"></path>
                                                    </svg>
                                                </span>
                                            </button>
                                        </span>
                                    </div>
                                </div>
                                <div class="k-form-field k-col-span-2">
                                    <label class="k-form-label k-label">Orientation:</label>
                                    <div class="k-form-field-wrap">
                                        <div class="k-segmented-control k-segmented-control-stretched" role="group">
                                            <div class="k-segmented-control-thumb" aria-hidden="true" style="width: 50%;"></div>
                                            <button class="k-segmented-control-button k-selected" aria-pressed="true">
                                                <span class="k-segmented-control-button-text">Portrait</span>
                                            </button>
                                            <button class="k-segmented-control-button" aria-pressed="false">
                                                <span class="k-segmented-control-button-text">Landscape</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <div class="k-form-field k-col-span-1">
                                    <label class="k-form-label k-label" id="crop-width-label" for="crop-width">Width:</label>
                                    <div class="k-form-field-wrap">
                                        <span class="k-numerictextbox k-input">
                                            <input id="crop-width" role="spinbutton" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="61">
                                            <span class="k-spin-button k-input-spinner">
                                                <button class="k-spinner-increase k-button k-icon-button" aria-label="Increase value">
                                                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-up" aria-hidden="true">
                                                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                            <path d="M19.108 15.058a.506.506 0 0 1-.715 0l-6.392-6.391-6.392 6.391a.506.506 0 0 1-.716-.716l6.75-6.75a.506.506 0 0 1 .716 0l6.75 6.75a.506.506 0 0 1 0 .716z"></path>
                                                        </svg>
                                                    </span>
                                                </button>
                                                <button class="k-spinner-decrease k-button k-icon-button" aria-label="Decrease value">
                                                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-down" aria-hidden="true">
                                                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                            <path d="m19.108 9.658-6.75 6.75a.506.506 0 0 1-.716 0l-6.75-6.75a.506.506 0 0 1 .716-.716L12 15.333l6.392-6.391a.506.506 0 0 1 .715.715z"></path>
                                                        </svg>
                                                    </span>
                                                </button>
                                            </span>
                                        </span>
                                    </div>
                                </div>
                                <div class="k-form-field k-col-span-1">
                                    <label class="k-form-label k-label" id="crop-height-label" for="crop-height">Height:</label>
                                    <div class="k-form-field-wrap">
                                        <span class="k-numerictextbox k-input">
                                            <input id="crop-height" role="spinbutton" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="68">
                                            <span class="k-spin-button k-input-spinner">
                                                <button class="k-spinner-increase k-button k-icon-button" aria-label="Increase value">
                                                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-up" aria-hidden="true">
                                                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                            <path d="M19.108 15.058a.506.506 0 0 1-.715 0l-6.392-6.391-6.392 6.391a.506.506 0 0 1-.716-.716l6.75-6.75a.506.506 0 0 1 .716 0l6.75 6.75a.506.506 0 0 1 0 .716z"></path>
                                                        </svg>
                                                    </span>
                                                </button>
                                                <button class="k-spinner-decrease k-button k-icon-button" aria-label="Decrease value">
                                                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-down" aria-hidden="true">
                                                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                                            <path d="m19.108 9.658-6.75 6.75a.506.506 0 0 1-.716 0l-6.75-6.75a.506.506 0 0 1 .716-.716L12 15.333l6.392-6.391a.506.506 0 0 1 .715.715z"></path>
                                                        </svg>
                                                    </span>
                                                </button>
                                            </span>
                                        </span>
                                    </div>
                                </div>
                                <div class="k-form-field k-col-span-2">
                                    <div class="k-form-field-wrap">
                                        <span class="k-checkbox-wrap">
                                            <input id="crop-lock" class="k-checkbox" type="checkbox">
                                        </span>
                                        <label class="k-checkbox-label" for="crop-lock">Lock aspect ratio</label>
                                    </div>
                                </div>
                            </div>
                        </fieldset>
                        <div class="k-form-buttons">
                            <button class="k-button k-button-primary">
                                <span class="k-button-icon k-icon k-svg-icon k-svg-i-check" aria-hidden="true">
                                    <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                        <path d="m20.458 7.633-10.8 10.8a.506.506 0 0 1-.716 0l-4.725-4.725a.506.506 0 0 1 .716-.716L9.3 17.358 19.742 6.917a.506.506 0 0 1 .715.716z"></path>
                                    </svg>
                                </span>
                                <span class="k-button-text">Confirm</span>
                            </button>
                            <button class="k-button">
                                <span class="k-button-icon k-icon k-svg-icon k-svg-i-cancel" aria-hidden="true">
                                    <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                        <path d="M15.058 14.342a.506.506 0 1 1-.716.716l-5.4-5.4a.506.506 0 0 1 .716-.716zM20.606 12A8.606 8.606 0 1 1 12 3.394 8.616 8.616 0 0 1 20.606 12m-1.012 0A7.594 7.594 0 1 0 12 19.594 7.6 7.6 0 0 0 19.594 12"></path>
                                    </svg>
                                </span>
                                <span class="k-button-text">Cancel</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

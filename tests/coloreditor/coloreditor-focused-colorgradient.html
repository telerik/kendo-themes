<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <style>
        .k-hue-slider {
            --kendo-slider-start: 0;
            --kendo-slider-end: 0;
        }
        .k-alpha-slider {
            --kendo-slider-start: 0;
            --kendo-slider-end: 100;
        }

    </style>
    <div id="test-area" class="k-d-grid k-grid-cols-1">
        <span>Focused Cologradient Inside ColorEditor</span>
        <section>
            <div role="textbox" aria-label="Color editor" tabindex="0" class="k-flatcolorpicker k-coloreditor">
                <div class="k-coloreditor-header k-hstack">
                    <div class="k-coloreditor-header-actions k-hstack"></div>
                    <div class="k-spacer"></div>
                    <div class="k-coloreditor-header-actions k-hstack">
                        <button class="k-button k-button-flat k-icon-button" aria-label="Reset color">
                            <span class="k-button-icon k-icon k-svg-icon k-svg-i-droplet-slash" aria-hidden="true">
                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path d="M4.35 2.686a.607.607 0 0 0-.899.81l2.4 2.64c-1.696 2.518-2.557 5.032-2.557 7.485a8.707 8.707 0 0 0 14.912 6.108l1.446 1.587a.607.607 0 0 0 .899-.819zM12 21.113a7.5 7.5 0 0 1-7.493-7.493c0-2.126.736-4.33 2.187-6.554l10.69 11.76A7.48 7.48 0 0 1 12 21.112zM8.294 4.009a.607.607 0 0 1-.02-.859A25 25 0 0 1 11.652.164a.61.61 0 0 1 .697 0 25.4 25.4 0 0 1 4.161 3.848c2.747 3.156 4.199 6.48 4.198 9.609a8.8 8.8 0 0 1-.312 2.316.61.61 0 0 1-.585.447.6.6 0 0 1-.161-.022.607.607 0 0 1-.425-.748 7.4 7.4 0 0 0 .269-1.993c0-6.037-5.974-11.03-7.493-12.203a26 26 0 0 0-2.847 2.57.607.607 0 0 1-.858.021z"></path>
                                </svg>
                            </span>
                        </button>
                        <div class="k-coloreditor-preview k-vstack">
                            <span class="k-coloreditor-preview-color k-color-preview k-no-color">
                                <span class="k-color-preview-mask"></span>
                            </span>
                            <span class="k-coloreditor-current-color k-color-preview">
                                <span class="k-color-preview-mask" style="background-color: fuchsia;"></span>
                            </span>
                        </div>
                    </div>
                </div>
                <div class="k-coloreditor-views k-vstack">
                    <div role="none" tabindex="-1" class="k-colorgradient k-focus">
                        <div class="k-colorgradient-canvas k-hstack">
                            <div class="k-hsv-rectangle" style="background: rgb(255, 0, 0);">
                                <div class="k-hsv-gradient">
                                    <div class="k-hsv-draghandle k-draghandle" role="slider" aria-orientation="undefined" aria-label="Color well with two-dimensional slider for selecting saturation and lightness" aria-valuetext="X: 73, Y: 50" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100" style="top: 50px; left: 73px;"></div>
                                </div>
                            </div>
                            <div class="k-hsv-controls k-hstack">
                                <div class="k-slider k-hue-slider k-slider-vertical k-colorgradient-slider" aria-label="Color slider">
                                    <div class="k-slider-track-wrap">
                                        <div class="k-slider-track">
                                            <div class="k-slider-selection"></div>
                                            <span class="k-draghandle k-draghandle-end" role="slider" tabindex="0" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100" aria-orientation="vertical" aria-label="Color slider"></span>
                                        </div>
                                    </div>
                                </div>
                                <div class="k-slider k-alpha-slider k-slider-vertical k-colorgradient-slider" aria-label="Color slider">
                                    <div class="k-slider-track-wrap">
                                        <div class="k-slider-track" style="background: linear-gradient(to top, transparent, rgb(255, 0, 0));">
                                            <div class="k-slider-selection"></div>
                                            <span class="k-draghandle k-draghandle-end" role="slider" tabindex="0" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100" aria-orientation="vertical" aria-label="Color slider"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="k-colorgradient-inputs k-hstack">
                            <div class="k-vstack">
                                <button class="k-colorgradient-toggle-mode k-button k-button-flat k-icon-button" aria-label="Toggle color input format">
                                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-caret-alt-expand" aria-hidden="true">
                                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                            <path d="M17.29 16.43a.607.607 0 0 1 0 .86l-4.86 4.86a.607.607 0 0 1-.86 0l-4.86-4.86a.607.607 0 0 1 .86-.86L12 20.86l4.43-4.43a.607.607 0 0 1 .86 0M7.57 7.568 12 3.139l4.43 4.429a.607.607 0 0 0 .86-.859l-4.86-4.86a.607.607 0 0 0-.86 0l-4.86 4.86a.607.607 0 0 0 .86.859"></path>
                                        </svg>
                                    </span>
                                </button>
                            </div>
                            <div class="k-vstack">
                                <span class="k-numerictextbox k-input">
                                    <input role="spinbutton" aria-label="Red channel" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="132">
                                </span>
                                <label class="k-colorgradient-input-label">R</label>
                            </div>
                            <div class="k-vstack">
                                <span class="k-numerictextbox k-input">
                                    <input role="spinbutton" aria-label="Green channel" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="132">
                                </span>
                                <label class="k-colorgradient-input-label">G</label>
                            </div>
                            <div class="k-vstack">
                                <span class="k-numerictextbox k-input">
                                    <input role="spinbutton" aria-label="Blue channel" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="132">
                                </span>
                                <label class="k-colorgradient-input-label">B</label>
                            </div>
                            <div class="k-vstack">
                                <span class="k-numerictextbox k-input">
                                    <input role="spinbutton" aria-label="Alpha channel" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="1.00">
                                </span>
                                <label class="k-colorgradient-input-label">A</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="k-actions k-actions-start k-actions-horizontal k-coloreditor-footer">
                    <button class="k-coloreditor-apply k-button k-button-primary">
                        <span class="k-button-text">Apply</span>
                    </button>
                    <button class="k-coloreditor-cancel k-button">
                        <span class="k-button-text">Cancel</span>
                    </button>
                </div>
            </div>
        </section>
    </div>
</body>
</html>

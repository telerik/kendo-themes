<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">

<body id="app" class="k-body">
    <style>
        .k-window {
            width: 100%;
            position: relative;
        }
        .k-form-label {
            align-items: flex-start !important;
        }
        /* needed for test */
        .k-editor-content>.ProseMirror {
            white-space: normal;
        }
        .k-form-horizontal .k-form-field:nth-child(3) .k-form-field-wrap {
            max-width: initial;
        }

    <div id="test-area" class="k-d-grid k-grid-cols-2">
        <span>Find Window</span>
        <span>Replace Window</span>
        <section>
            <div class="k-window" role="dialog" aria-labelledby="k-window-title-1">

                    <span class="k-window-title" id="k-window-title-1">Find and Replace</span>

                            <span class="k-button-icon k-icon k-svg-icon k-svg-i-x" aria-hidden="true">
                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path d="M18.433 17.717a.506.506 0 1 1-.715.715l-5.717-5.716-5.717 5.716a.506.506 0 0 1-.716-.715L11.284 12 5.568 6.283a.506.506 0 0 1 .716-.716l5.717 5.716 5.717-5.716a.506.506 0 0 1 .715.716L12.717 12z"></path>
                                </svg>
                            </span>

                </div>

                            <ul class="k-tabstrip-items k-reset k-tabstrip-items-start" role="tablist">
                                <li class="k-tabstrip-item k-active" role="tab" aria-selected="true">
                                    <span class="k-link">
                                        <span class="k-link-text">Find</span>
                                    </span>
                                </li>
                                <li class="k-tabstrip-item" role="tab">
                                    <span class="k-link">
                                        <span class="k-link-text">Replace</span>
                                    </span>
                                </li>
                            </ul>
                        </div>
                        <div class="k-tabstrip-content k-active" role="tabpanel">
                            <div class="k-form">
                                <div class="k-form-field">
                                    <label class="k-form-label k-label">Find What:</label>
                                    <div class="k-form-field-wrap">
                                        <span class="k-textbox k-input">
                                            <input class="k-input-inner" placeholder="" autocomplete="off" type="text" value="editor">
                                        </span>
                                    </div>
                                </div>
                                <div class="k-form-field">
                                    <div class="k-form-field-wrap">
                                        <ul class="k-search-options k-checkbox-list k-list-vertical">
                                            <li class="k-checkbox-list-item">
                                                <span class="k-checkbox-wrap">
                                                    <input id="cb-label-after" class="k-checkbox" type="checkbox">
                                                </span>
                                                <label class="k-checkbox-label" for="cb-label-after">Match case</label>
                                            </li>
                                            <li class="k-checkbox-list-item">
                                                <span class="k-checkbox-wrap">
                                                    <input id="cb-label-after" class="k-checkbox" type="checkbox">
                                                </span>
                                                <label class="k-checkbox-label" for="cb-label-after">Match whole word only</label>
                                            </li>
                                            <li class="k-checkbox-list-item">
                                                <span class="k-checkbox-wrap">
                                                    <input id="cb-label-after" class="k-checkbox" type="checkbox">
                                                </span>
                                                <label class="k-checkbox-label" for="cb-label-after">Match cyclic (Wrap around)</label>
                                            </li>
                                            <li class="k-checkbox-list-item">
                                                <span class="k-checkbox-wrap">
                                                    <input id="cb-label-after" class="k-checkbox" type="checkbox">
                                                </span>

                                            </li>
                                        </ul>
                                    </div>
                                </div>
                                <div class="k-matches-container">
                                    <button class="k-button k-button-flat k-button-primary">
                                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-left" aria-hidden="true">
                                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">

                                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-chevron-right" aria-hidden="true">

                                        </span>

                            </div>
                        </div>
                    </div>
                </div>
            </div>

                                </div>
                                <div class="k-form-field">
                                    <div class="k-form-field-wrap">
                                        <div class="k-actions k-actions-end k-actions-horizontal">
                                            <button class="k-button">

                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <div class="k-form-field">
                                    <div class="k-form-field-wrap">
                                        <ul class="k-search-options k-checkbox-list k-list-vertical">

                            </div>

                    </div>

            </div>

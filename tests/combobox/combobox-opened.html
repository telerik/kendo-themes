<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/default/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <style>
        #test-area {
            max-width: 660px;
        }
        .k-animation-container {
            position: relative;
        }

    </style>
    <div id="test-area" class="k-d-grid k-grid-cols-2">
        <span>ComboBox Popup Opened</span>
        <span>ComboBox Popup Opened RTL</span>
        <div>
            <span class="k-combobox k-input">
                <input role="combobox" aria-haspopup="listbox" aria-expanded="true" aria-controls="combobox-1-listbox" aria-activedescendant="k-combobox-1-item-2" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="Opened">
                <span class="k-clear-value">
                    <span class="k-icon k-svg-icon k-svg-i-x" aria-hidden="true">
                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                            <path d="M416 141.3 301.3 256 416 370.7 370.7 416 256 301.3 141.3 416 96 370.7 210.7 256 96 141.3 141.3 96 256 210.7 370.7 96z"></path>
                        </svg>
                    </span>
                </span>
                <button class="k-input-button k-button k-icon-button" aria-label="Open popup" tabindex="-1">
                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-caret-alt-down" aria-hidden="true">
                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                            <path d="M256 352 128 160h256z"></path>
                        </svg>
                    </span>
                </button>
            </span>
            <div class="k-combobox-popup-container k-animation-container k-animation-container-shown" role="region" aria-label="Combobox suggestions">
                <div class="k-child-animation-container">
                    <div class="k-list-container k-combobox-popup k-popup">
                        <div class="k-list">
                            <div class="k-list-content">
                                <ul aria-label="Options" id="combobox-1-listbox" role="listbox" class="k-list-ul">
                                    <li id="k-combobox-1-item-1" role="option" tabindex="-1" aria-selected="true" class="k-list-item k-selected">
                                        <span class="k-list-item-text">Selected item</span>
                                    </li>
                                    <li id="k-combobox-1-item-2" role="option" tabindex="0" aria-selected="false" class="k-list-item k-focus">
                                        <span class="k-list-item-text">Focused item</span>
                                    </li>
                                    <li id="k-combobox-1-item-3" role="option" tabindex="-1" aria-selected="false" class="k-list-item">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div dir="rtl">
            <span class="k-combobox k-input">
                <input role="combobox" aria-haspopup="listbox" aria-expanded="true" aria-controls="combobox-1-listbox" aria-activedescendant="k-combobox-1-item-5" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="Opened">
                <span class="k-clear-value">
                    <span class="k-icon k-svg-icon k-svg-i-x" aria-hidden="true">
                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                            <path d="M416 141.3 301.3 256 416 370.7 370.7 416 256 301.3 141.3 416 96 370.7 210.7 256 96 141.3 141.3 96 256 210.7 370.7 96z"></path>
                        </svg>
                    </span>
                </span>
                <button class="k-input-button k-button k-icon-button" aria-label="Open popup" tabindex="-1">
                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-caret-alt-down" aria-hidden="true">
                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                            <path d="M256 352 128 160h256z"></path>
                        </svg>
                    </span>
                </button>
            </span>
            <div class="k-combobox-popup-container k-animation-container k-animation-container-shown" role="region" aria-label="Combobox suggestions">
                <div class="k-child-animation-container">
                    <div class="k-list-container k-combobox-popup k-popup">
                        <div class="k-list">
                            <div class="k-list-content">
                                <ul aria-label="Options" id="combobox-1-listbox" role="listbox" class="k-list-ul">
                                    <li id="k-combobox-1-item-4" role="option" tabindex="-1" aria-selected="true" class="k-list-item k-selected">
                                        <span class="k-list-item-text">Selected item</span>
                                    </li>
                                    <li id="k-combobox-1-item-5" role="option" tabindex="0" aria-selected="false" class="k-list-item k-focus">
                                        <span class="k-list-item-text">Focused item</span>
                                    </li>
                                    <li id="k-combobox-1-item-6" role="option" tabindex="-1" aria-selected="false" class="k-list-item">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <span>ComboBox No Data</span>
        <span>ComboBox With Icons</span>
        <div>
            <span class="k-combobox k-input">
                <input role="combobox" aria-haspopup="listbox" aria-expanded="true" aria-controls="combobox-nodata-listbox" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="No results">
                <span class="k-clear-value">
                    <span class="k-icon k-svg-icon k-svg-i-x" aria-hidden="true">
                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                            <path d="M416 141.3 301.3 256 416 370.7 370.7 416 256 301.3 141.3 416 96 370.7 210.7 256 96 141.3 141.3 96 256 210.7 370.7 96z"></path>
                        </svg>
                    </span>
                </span>
                <button class="k-input-button k-button k-icon-button" aria-label="Open popup" tabindex="-1">
                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-caret-alt-down" aria-hidden="true">
                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                            <path d="M256 352 128 160h256z"></path>
                        </svg>
                    </span>
                </button>
            </span>
            <div class="k-combobox-popup-container k-animation-container k-animation-container-shown" role="region" aria-label="Combobox suggestions">
                <div class="k-child-animation-container">
                    <div class="k-list-container k-combobox-popup k-popup">
                        <div class="k-list">
                            <div class="k-list-content">
                                <ul aria-label="Options" id="combobox-nodata-listbox" role="listbox" class="k-list-ul"></ul>
                            </div>
                            <span class="k-no-data" aria-live="polite">No data found.</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div>
            <span class="k-combobox k-input">
                <input role="combobox" aria-haspopup="listbox" aria-expanded="true" aria-controls="combobox-icons-listbox" aria-activedescendant="k-combobox-icons-item-1" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="With icons">
                <span class="k-clear-value">
                    <span class="k-icon k-svg-icon k-svg-i-x" aria-hidden="true">
                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                            <path d="M416 141.3 301.3 256 416 370.7 370.7 416 256 301.3 141.3 416 96 370.7 210.7 256 96 141.3 141.3 96 256 210.7 370.7 96z"></path>
                        </svg>
                    </span>
                </span>
                <button class="k-input-button k-button k-icon-button" aria-label="Open popup" tabindex="-1">
                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-caret-alt-down" aria-hidden="true">
                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                            <path d="M256 352 128 160h256z"></path>
                        </svg>
                    </span>
                </button>
            </span>
            <div class="k-combobox-popup-container k-animation-container k-animation-container-shown" role="region" aria-label="Combobox suggestions">
                <div class="k-child-animation-container">
                    <div class="k-list-container k-combobox-popup k-popup">
                        <div class="k-list">
                            <div class="k-list-content">
                                <ul aria-label="Options" id="combobox-icons-listbox" role="listbox" class="k-list-ul">
                                    <li id="k-combobox-icons-item-1" role="option" tabindex="0" aria-selected="false" class="k-list-item k-focus">
                                        <span class="k-list-item-icon-wrapper">
                                            <span class="k-list-item-icon k-icon k-svg-icon k-svg-i-folder" aria-hidden="true">
                                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                                                    <path d="m242.8 128-32-32H96v288h320V192H128v-32h288c17.7 0 32 14.3 32 32v192c0 17.7-14.3 32-32 32H96c-17.7 0-32-14.3-32-32V96c0-17.7 14.3-32 32-32h128l64 64"></path>
                                                </svg>
                                            </span>
                                        </span>
                                        <span class="k-list-item-text">Folder item</span>
                                    </li>
                                    <li id="k-combobox-icons-item-2" role="option" tabindex="-1" aria-selected="false" class="k-list-item">
                                        <span class="k-list-item-icon-wrapper">
                                            <span class="k-list-item-icon k-icon k-svg-icon k-svg-i-file" aria-hidden="true">
                                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                                                    <path d="M352 32H96c-17.7 0-32 14.3-32 32v384c0 17.7 14.3 32 32 32h320c17.7 0 32-14.3 32-32V128zm64 416H96V64h224v96h96z"></path>
                                                </svg>
                                            </span>
                                        </span>
                                        <span class="k-list-item-text">File item</span>
                                    </li>
                                    <li id="k-combobox-icons-item-3" role="option" tabindex="-1" aria-selected="true" class="k-list-item k-selected">
                                        <span class="k-list-item-icon-wrapper">
                                            <span class="k-list-item-icon k-icon k-svg-icon k-svg-i-image" aria-hidden="true">
                                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                                                    <path d="M304 160c26.5 0 48 21.5 48 48s-21.5 48-48 48-48-21.5-48-48 21.5-48 48-48m144-96H64c-17.6 0-32 14.4-32 32v320c0 17.6 14.4 32 32 32h384c17.6 0 32-14.4 32-32V96c0-17.6-14.4-32-32-32m-.1 272-64-64-80 80L176 224 64 336V96.1l.1-.1h383.8l.1.1z"></path>
                                                </svg>
                                            </span>
                                        </span>
                                        <span class="k-list-item-text">Image item</span>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

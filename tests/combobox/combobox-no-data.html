<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/default/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <style>
        #test-area {
            max-width: 660px;
        }
        .k-animation-container {
            position: relative;
        }

    </style>
    <div id="test-area" class="k-d-grid k-grid-cols-2">
        <span>Combobox No Data</span>
        <span>Combobox No Data RTL</span>
        <div>
            <span class="k-combobox k-input">
                <input role="combobox" aria-label="Combobox" aria-haspopup="listbox" aria-expanded="true" aria-controls="k-combobox-nodata-listbox" aria-autocomplete="list" tabindex="0" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
                <button class="k-input-button k-button k-icon-button" aria-label="Open dropdown" tabindex="-1">
                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-caret-alt-down" aria-hidden="true">
                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                            <path d="M256 352 128 160h256z"></path>
                        </svg>
                    </span>
                </button>
            </span>
            <div id="k-combobox-nodata-popup" class="k-combobox-popup-container k-animation-container k-animation-container-shown" role="region" aria-label="Combobox suggestions">
                <div class="k-child-animation-container">
                    <div class="k-list-container k-combobox-popup k-popup">
                        <div class="k-list">
                            <span aria-live="polite" class="k-no-data">No data found.</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div dir="rtl">
            <span class="k-combobox k-input">
                <input role="combobox" aria-label="Combobox" aria-haspopup="listbox" aria-expanded="true" aria-controls="k-combobox-nodata-rtl-listbox" aria-autocomplete="list" tabindex="0" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
                <button class="k-input-button k-button k-icon-button" aria-label="Open dropdown" tabindex="-1">
                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-caret-alt-down" aria-hidden="true">
                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                            <path d="M256 352 128 160h256z"></path>
                        </svg>
                    </span>
                </button>
            </span>
            <div id="k-combobox-nodata-rtl-popup" class="k-combobox-popup-container k-animation-container k-animation-container-shown" role="region" aria-label="Combobox suggestions">
                <div class="k-child-animation-container">
                    <div class="k-list-container k-combobox-popup k-popup">
                        <div class="k-list">
                            <span aria-live="polite" class="k-no-data">No data found.</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

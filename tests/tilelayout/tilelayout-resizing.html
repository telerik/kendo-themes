<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/default/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <div id="test-area">
        <div class="k-tilelayout" role="list" style="grid-template-columns: repeat(4, minmax(0px, 1fr)); gap: 16px;">
            <div class="k-tilelayout-item k-resize-x k-card" role="listitem" aria-labelledby="k-tilelayout-title-1" tabindex="0" aria-keyshortcuts="Enter">
                <div class="k-tilelayout-item-header k-cursor-move k-card-header">
                    <div class="k-card-title" id="k-tilelayout-title-1">Card Title</div>
                </div>
                <div class="k-tilelayout-item-body k-card-body">Horizontally resizable card</div>
            </div>
            <div class="k-tilelayout-item k-resize-y k-card" role="listitem" aria-labelledby="k-tilelayout-title-2" tabindex="0" aria-keyshortcuts="Enter">
                <div class="k-tilelayout-item-header k-cursor-move k-card-header">
                    <div class="k-card-title" id="k-tilelayout-title-2">Card Title</div>
                </div>
                <div class="k-tilelayout-item-body k-card-body">Vertically resizable card</div>
            </div>
            <div class="k-tilelayout-item k-resize k-card" role="listitem" aria-labelledby="k-tilelayout-title-3" tabindex="0" aria-keyshortcuts="Enter">
                <div class="k-tilelayout-item-header k-cursor-move k-card-header">
                    <div class="k-card-title" id="k-tilelayout-title-3">Card Title</div>
                </div>
                <div class="k-tilelayout-item-body k-card-body">Horizontally and Vertically resizable card</div>
            </div>
            <div class="k-tilelayout-item k-card" role="listitem" aria-labelledby="k-tilelayout-title-4" tabindex="0" aria-keyshortcuts="Enter">
                <div class="k-tilelayout-item-header k-cursor-move k-card-header">
                    <div class="k-card-title" id="k-tilelayout-title-4">Card Title</div>
                </div>
                <div class="k-tilelayout-item-body k-card-body">Non-resizable card</div>
            </div>
        </div>
    </div>
</body>
</html>

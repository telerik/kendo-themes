<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/default/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <style>
        #test-area {
            max-width: 660px;
        }
        .k-animation-container {
            position: relative;
        }

    </style>
    <div id="test-area" class="k-d-grid k-grid-cols-2">
        <span>Autocomplete</span>
        <span>Autocomplete RTL</span>
        <div>
            <span class="k-autocomplete k-input k-focus">
                <input role="combobox" aria-label="Autocomplete" aria-haspopup="listbox" aria-expanded="true" aria-controls="k-autocomplete-listbox" aria-activedescendant="k-autocomplete-listbox-item-0" aria-autocomplete="list" tabindex="0" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="Opened">
                <span class="k-clear-value">
                    <span class="k-icon k-svg-icon k-svg-i-x" aria-hidden="true">
                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                            <path d="M416 141.3 301.3 256 416 370.7 370.7 416 256 301.3 141.3 416 96 370.7 210.7 256 96 141.3 141.3 96 256 210.7 370.7 96z"></path>
                        </svg>
                    </span>
                </span>
            </span>
            <div id="k-autocomplete-popup" class="k-autocomplete-popup-container k-animation-container k-animation-container-shown" role="region" aria-label="Autocomplete suggestions">
                <div class="k-child-animation-container">
                    <div class="k-list-container k-autocomplete-popup k-popup">
                        <div role="listbox" aria-label="Autocomplete options" listboxid="k-autocomplete-listbox" class="k-list">
                            <div class="k-list-content">
                                <ul class="k-list-ul">
                                    <li id="k-autocomplete-listbox-item-0" class="k-list-item k-focus k-selected" role="option" aria-selected="true" tabindex="0">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                    <li id="k-autocomplete-listbox-item-1" class="k-list-item" role="option" aria-selected="false" tabindex="-1">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                    <li id="k-autocomplete-listbox-item-2" class="k-list-item" role="option" aria-selected="false" tabindex="-1">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div dir="rtl">
            <span class="k-autocomplete k-input k-focus">
                <input role="combobox" aria-label="Autocomplete" aria-haspopup="listbox" aria-expanded="true" aria-controls="k-autocomplete-listbox" aria-activedescendant="k-autocomplete-listbox-item-0" aria-autocomplete="list" tabindex="0" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="Opened">
                <span class="k-clear-value">
                    <span class="k-icon k-svg-icon k-svg-i-x" aria-hidden="true">
                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                            <path d="M416 141.3 301.3 256 416 370.7 370.7 416 256 301.3 141.3 416 96 370.7 210.7 256 96 141.3 141.3 96 256 210.7 370.7 96z"></path>
                        </svg>
                    </span>
                </span>
            </span>
            <div id="k-autocomplete-popup" class="k-autocomplete-popup-container k-animation-container k-animation-container-shown" role="region" aria-label="Autocomplete suggestions">
                <div class="k-child-animation-container">
                    <div class="k-list-container k-autocomplete-popup k-popup">
                        <div role="listbox" aria-label="Autocomplete options" listboxid="k-autocomplete-listbox" class="k-list">
                            <div class="k-list-content">
                                <ul class="k-list-ul">
                                    <li id="k-autocomplete-listbox-item-0" class="k-list-item k-focus k-selected" role="option" aria-selected="true" tabindex="0">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                    <li id="k-autocomplete-listbox-item-1" class="k-list-item" role="option" aria-selected="false" tabindex="-1">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                    <li id="k-autocomplete-listbox-item-2" class="k-list-item" role="option" aria-selected="false" tabindex="-1">
                                        <span class="k-list-item-text">List item</span>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 0px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/default/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <style>
        #test-area {
            max-width: 660px;
        }
        .k-animation-container {
            position: relative;
        }

    </style>
    <div id="test-area" class="k-d-grid k-grid-cols-2">
        <span>Autocomplete No Data</span>
        <span>Autocomplete No Data RTL</span>
        <div>
            <span class="k-autocomplete k-input">
                <input role="combobox" aria-label="Autocomplete" aria-haspopup="listbox" aria-expanded="true" aria-controls="k-autocomplete-nodata-listbox" aria-autocomplete="list" tabindex="0" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
            </span>
            <div id="k-autocomplete-nodata-popup" class="k-autocomplete-popup-container k-animation-container k-animation-container-shown" role="region" aria-label="Autocomplete suggestions">
                <div class="k-child-animation-container">
                    <div class="k-list-container k-autocomplete-popup k-popup">
                        <div class="k-list">
                            <span aria-live="polite" class="k-no-data">No data found.</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div dir="rtl">
            <span class="k-autocomplete k-input">
                <input role="combobox" aria-label="Autocomplete" aria-haspopup="listbox" aria-expanded="true" aria-controls="k-autocomplete-nodata-rtl-listbox" aria-autocomplete="list" tabindex="0" class="k-input-inner" placeholder="" autocomplete="off" type="text" value="">
            </span>
            <div id="k-autocomplete-nodata-rtl-popup" class="k-autocomplete-popup-container k-animation-container k-animation-container-shown" role="region" aria-label="Autocomplete suggestions">
                <div class="k-child-animation-container">
                    <div class="k-list-container k-autocomplete-popup k-popup">
                        <div class="k-list">
                            <span aria-live="polite" class="k-no-data">No data found.</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

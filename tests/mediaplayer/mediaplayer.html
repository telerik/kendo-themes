<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">

    <link rel="stylesheet" href="/packages/html/assets/styles.css">

</head>
<body id="app" class="k-body">

        .k-mediaplayer {

        .k-slider-horizontal {

            --kendo-slider-end: 50;
        }

    </style>

                        </div>
                    </div>
                </div>
                <div class="k-mediaplayer-toolbar k-toolbar" role="toolbar" aria-label="Toolbar">

                    </div>
                    <div class="k-spacer"></div>
                    <button class="k-toolbar-button k-volume-button k-button k-button-flat k-icon-button" aria-label="Mute">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-volume-up" aria-hidden="true">

                        </span>

                        <div aria-label="Slider" class="k-slider k-mediaplayer-volume k-slider-horizontal">
                            <div class="k-slider-track-wrap">
                                <div class="k-slider-track">
                                    <div class="k-slider-selection"></div>
                                    <span class="k-draghandle k-draghandle-end" role="slider" tabindex="0" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100" aria-label="Slider"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-fullscreen" aria-hidden="true">

</body>
</html>

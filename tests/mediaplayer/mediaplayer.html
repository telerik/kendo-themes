<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <style>
        .k-mediaplayer {
            height: 360px;
        }
        .k-slider-horizontal {
            --kendo-slider-start: 0;
            --kendo-slider-end: 50;
        }

    </style>
    <div id="test-area" class="k-d-grid">
        <div class="k-mediaplayer">
            <div class="k-mediaplayer-titlebar">Media player title</div>
            <div class="k-mediaplayer-toolbar-wrap">
                <div aria-label="Slider" class="k-slider k-mediaplayer-seekbar k-slider-horizontal">
                    <div class="k-slider-track-wrap">
                        <div class="k-slider-track">
                            <div class="k-slider-selection"></div>
                            <span class="k-draghandle k-draghandle-end" role="slider" tabindex="0" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100" aria-label="Slider"></span>
                        </div>
                    </div>
                </div>
                <div class="k-mediaplayer-toolbar k-toolbar" role="toolbar" aria-label="Toolbar">
                    <button class="k-toolbar-button k-play-button k-button k-button-flat k-icon-button" aria-label="Play">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-play" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">

                            </svg>
                        </span>
                    </button>
                    <div class="k-mediaplayer-currenttime-wrap k-toolbar-item">
                        <span class="k-mediaplayer-currenttime">00:18</span> / <span class="k-mediaplayer-duration">00:55</span>
                    </div>
                    <div class="k-spacer"></div>
                    <button class="k-toolbar-button k-volume-button k-button k-button-flat k-icon-button" aria-label="Mute">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-volume-up" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M14.248 3.445a.51.51 0 0 0-.533.055L7.777 8.119H3.901A1.18 1.18 0 0 0 2.72 9.3v5.4a1.18 1.18 0 0 0 1.181 1.181h3.876l5.938 4.619a.506.506 0 0 0 .817-.4V3.9a.51.51 0 0 0-.284-.455M3.732 14.7V9.3a.17.17 0 0 1 .169-.169h3.544v5.738H3.901a.17.17 0 0 1-.169-.169m9.788 4.365-5.063-3.937V8.872l5.063-3.937zm4.263-9.184a3.206 3.206 0 0 1 0 4.239.506.506 0 1 1-.759-.67 2.194 2.194 0 0 0 0-2.9.506.506 0 0 1 .759-.669M21.957 12a6.57 6.57 0 0 1-1.676 4.387.506.506 0 1 1-.754-.675 5.57 5.57 0 0 0 0-7.425.506.506 0 1 1 .754-.675A6.57 6.57 0 0 1 21.957 12"></path>
                            </svg>
                        </span>
                    </button>
                    <div class="k-mediaplayer-volume-wrap k-toolbar-item">
                        <div aria-label="Slider" class="k-slider k-mediaplayer-volume k-slider-horizontal">
                            <div class="k-slider-track-wrap">
                                <div class="k-slider-track">
                                    <div class="k-slider-selection"></div>
                                    <span class="k-draghandle k-draghandle-end" role="slider" tabindex="0" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100" aria-label="Slider"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button class="k-toolbar-button k-fullscreen-button k-button k-button-flat k-icon-button" aria-label="Full screen">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-fullscreen" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M19.256 5.25V9.3a.506.506 0 0 1-1.012 0V6.472l-3.861 3.861a.506.506 0 0 1-.716-.716l3.861-3.861H14.7a.507.507 0 0 1 0-1.013h4.05a.506.506 0 0 1 .506.506zm-9.639 8.417-3.861 3.861V14.7a.507.507 0 0 0-1.013 0v4.05a.506.506 0 0 0 .506.506h4.05a.506.506 0 0 0 0-1.012H6.471l3.861-3.861a.506.506 0 0 0-.716-.716zm9.133.527a.506.506 0 0 0-.506.506v2.828l-3.861-3.861a.506.506 0 0 0-.716.716l3.861 3.861H14.7a.506.506 0 0 0 0 1.012h4.05a.506.506 0 0 0 .506-.506V14.7a.506.506 0 0 0-.506-.506M6.472 5.756H9.3a.507.507 0 0 0 0-1.013H5.25a.506.506 0 0 0-.506.506v4.05a.506.506 0 0 0 1.012 0V6.471l3.861 3.861a.506.506 0 0 0 .716-.716z"></path>
                            </svg>
                        </span>
                    </button>
                </div>
            </div>
            <div class="k-mediaplayer-overlay"></div>
        </div>
    </div>
</body>
</html>

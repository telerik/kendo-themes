<!doctype html>
<html lang="en" class="k-no-animations" style="--kendo-scrollbar-width: 15px;">
<head>
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" data-role="kendo-theme" href="/packages/meridian/dist/all.css">
    <link rel="stylesheet" data-role="kendo-theme-utils" href="/packages/utils/dist/all.css">
    <link rel="stylesheet" href="/packages/html/assets/styles.css">
    <script src="/packages/html/assets/scripts.js"></script>
</head>
<body id="app" class="k-body">
    <div id="test-area" class="k-d-grid k-grid-cols-1">
        <span>TaskBoard Resources</span>
        <div class="k-taskboard-column">
            <div class="k-taskboard-column-header">
                <div class="k-taskboard-column-header-text k-text-ellipsis" id="k-taskboard-column-header-1">Column Header</div>
                <span class="k-spacer"></span>
                <div class="k-taskboard-column-header-actions">
                    <button class="k-button k-button-flat k-icon-button" aria-label="Edit column" title="Edit column">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-pencil" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="m20.26 7.51-3.771-3.771a1.18 1.18 0 0 0-1.671 0L4.414 14.144a1.18 1.18 0 0 0-.346.835v3.771a1.18 1.18 0 0 0 1.181 1.181H9.02a1.18 1.18 0 0 0 .835-.346L20.259 9.18a1.18 1.18 0 0 0 0-1.671zM9.139 18.869a.17.17 0 0 1-.119.05H5.249a.17.17 0 0 1-.169-.169v-3.771a.17.17 0 0 1 .05-.119l7.544-7.545 4.009 4.009zM19.543 8.465l-2.144 2.144L13.39 6.6l2.144-2.145a.17.17 0 0 1 .239 0l3.77 3.771a.17.17 0 0 1 0 .239"></path>
                            </svg>
                        </span>
                    </button>
                    <button class="k-button k-button-flat k-icon-button" aria-label="Add card" title="Add card">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-plus" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M19.931 12a.506.506 0 0 1-.506.506h-6.919v6.919a.507.507 0 0 1-1.013 0v-6.919H4.574a.507.507 0 0 1 0-1.013h6.919V4.574a.506.506 0 0 1 1.012 0v6.919h6.919a.506.506 0 0 1 .506.506z"></path>
                            </svg>
                        </span>
                    </button>
                    <button class="k-button k-button-flat k-icon-button" aria-label="Delete column" title="Delete column">
                        <span class="k-button-icon k-icon k-svg-icon k-svg-i-x" aria-hidden="true">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M18.433 17.717a.506.506 0 1 1-.715.715l-5.717-5.716-5.717 5.716a.506.506 0 0 1-.716-.715L11.284 12 5.568 6.283a.506.506 0 0 1 .716-.716l5.717 5.716 5.717-5.716a.506.506 0 0 1 .715.716L12.717 12z"></path>
                            </svg>
                        </span>
                    </button>
                </div>
            </div>
            <div class="k-taskboard-column-cards-container" role="list" tabindex="0" aria-labelledby="k-taskboard-column-header-1">
                <div class="k-taskboard-column-cards" role="presentation">
                    <div class="k-taskboard-card k-taskboard-card-category k-card" role="listitem" tabindex="0" style="border-left-color: orange;">
                        <div class="k-hbox k-card-header">
                            <a class="k-card-title k-link">Card Title</a>
                            <span class="k-spacer"></span>
                            <span class="k-card-header-actions">
                                <button class="k-card-details k-button k-button-flat k-icon-button" aria-label="Card details">
                                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-more-vertical" aria-hidden="true">
                                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                            <path d="M11.156 6.263a.844.844 0 1 1 .844.844.844.844 0 0 1-.844-.844M12 11.157a.844.844 0 1 0 .844.844.844.844 0 0 0-.844-.844m0 5.738a.844.844 0 1 0 .844.844.844.844 0 0 0-.844-.844"></path>
                                        </svg>
                                    </span>
                                </button>
                            </span>
                        </div>
                        <div class="k-card-body">
                            <p>Card Body</p>
                        </div>
                    </div>
                    <div class="k-taskboard-card k-taskboard-card-category k-card" role="listitem" tabindex="0" style="border-left-color: teal;">
                        <div class="k-hbox k-card-header">
                            <a class="k-card-title k-link">Card Title</a>
                            <span class="k-spacer"></span>
                            <span class="k-card-header-actions">
                                <button class="k-card-details k-button k-button-flat k-icon-button" aria-label="Card details">
                                    <span class="k-button-icon k-icon k-svg-icon k-svg-i-more-vertical" aria-hidden="true">
                                        <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                            <path d="M11.156 6.263a.844.844 0 1 1 .844.844.844.844 0 0 1-.844-.844M12 11.157a.844.844 0 1 0 .844.844.844.844 0 0 0-.844-.844m0 5.738a.844.844 0 1 0 .844.844.844.844 0 0 0-.844-.844"></path>
                                        </svg>
                                    </span>
                                </button>
                            </span>
                        </div>
                        <div class="k-card-body">
                            <p>Card Body</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

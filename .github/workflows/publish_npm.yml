name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: "Release type"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stable
      dry-run:
        description: "Dry run (no actual publish)"
        required: false
        default: false
        type: boolean
  release:
    types: [published]
  workflow_run:
    workflows:
      - "CI Weekly"
    branches:
      - develop
    types:
      - completed

env:
  RELEASE_TYPE: ${{ github.event_name == 'release' && 'stable' || (github.event_name == 'workflow_run' && 'dev' || inputs.release-type) }}
  DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry-run) && '--dry-run' || '' }}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: upload

    permissions:
      id-token: write # Required by npm OIDC trusted publishing
      contents: write # Allows nx release to create tags and GitHub releases
      packages: read

    steps:
      - name: Import Secrets
        id: import-secrets
        uses: LanceMcCarthy/akeyless-action@v5
        with:
          access-id: ${{ secrets.GH_AKEYLESS_ACCESS_ID }}
          static-secrets: '{ "/WebComponents/prod/tokens/GH_TOKEN": "GH_TOKEN" }'
          export-secrets-to-environment: false

      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TYPE == 'stable' && 'master' || 'develop' }}
          fetch-depth: "0"
          token: ${{ steps.import-secrets.outputs.GH_TOKEN }}

      - name: Setup git
        run: |
          git config user.name "kendo-bot"
          git config user.email "kendouiteam@progress.com"

      - name: Merge develop to master
        if: env.RELEASE_TYPE == 'stable'
        run: |
          git fetch --quiet
          git reset --hard origin/master
          git merge --ff-only --quiet origin/develop

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Build themes for dist
        run: |
          npm run sass:dist
          npm run docs

      - name: Derive stable version from release tag
        if: env.RELEASE_TYPE == 'stable' && github.event_name == 'release'
        run: echo "RELEASE_VERSION=${{ github.event.release.tag_name }}" | sed 's/=v/=/' >> "$GITHUB_ENV"

      - name: Nx release (stable)
        if: env.RELEASE_TYPE == 'stable'
        run: |
          npx nx release version ${RELEASE_VERSION:-''} ${{ env.DRY_RUN }}
          npx nx release changelog ${RELEASE_VERSION:-''} ${{ env.DRY_RUN }}
          npx nx release publish ${{ env.DRY_RUN }}
        env:
          GITHUB_TOKEN: ${{ steps.import-secrets.outputs.GH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Nx release (dev)
        if: env.RELEASE_TYPE == 'dev'
        run: |
          npx nx release version --preid dev --specifier prerelease ${{ env.DRY_RUN }}
          DEV_VERSION=$(jq -r '.version' packages/core/package.json)
          npx nx release changelog $DEV_VERSION ${{ env.DRY_RUN }}
          npx nx release publish --tag dev ${{ env.DRY_RUN }}
        env:
          GITHUB_TOKEN: ${{ steps.import-secrets.outputs.GH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Mark checks as successful
        if: env.DRY_RUN == ''
        run: |
          commit=$(git rev-parse HEAD)
          ./build/mark-checks.sh $commit
        env:
          GH_TOKEN: ${{ steps.import-secrets.outputs.GH_TOKEN }}

      - name: Push to GitHub
        if: env.RELEASE_TYPE == 'stable' && env.DRY_RUN == ''
        run: |
          git push origin master --tags --quiet > /dev/null 2>&1
          git push origin master:develop --quiet > /dev/null 2>&1

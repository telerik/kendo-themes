name: CI

on:
  push:
    branches-ignore:
      - 'master'
      - 'develop'
      - 'v4-dev'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  compile-themes:
    name: Compile themes
    uses: ./.github/workflows/_compile-themes.yml

  test-html-spec:
    name: Test HTML spec
    uses: ./.github/workflows/_test-html-spec.yml

  render-test-pages:
    name: Render test pages
    uses: ./.github/workflows/_render-test-pages.yml
    with:
      force-render: NO
      upload-policy: conditionally

  create-screenshots:
    name: Create screenshots
    uses: ./.github/workflows/_create-screenshots.yml
    needs: [ compile-themes ]


  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    needs: [ render-test-pages, create-screenshots ]

    outputs:
      snapshot_sha: ${{ steps.snapshot_sha.outputs.sha }}

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: .tmp

      - name: Unpack artifacts
        run: find .tmp -name "*.tar" -type f -exec tar -xf {} \;

      - name: Compare artifacts
        run: |
          HAS_CHANGES=0
          HAS_NEW=0
          git diff --exit-code --quiet -- tests/ || HAS_CHANGES=1
          [[ $(git ls-files --others --exclude-standard tests/) ]] && HAS_NEW=1
          echo "HAS_CHANGES=$HAS_CHANGES" >> $GITHUB_ENV
          echo "HAS_NEW=$HAS_NEW" >> $GITHUB_ENV

      - name: Setup git user
        run: |
          git config user.name "kendo-bot"
          git config user.email "kendouiteam@progress.com"

      - name: Push changes to GitHub
        if: ${{ (env.HAS_CHANGES == 1 || env.HAS_NEW == 1) }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Visual tests have detected changes. Updating markup and screenshots."

          git add tests/
          git commit -m "chore: update visual previews"

          git push

      - name: Get snapshot commit SHA
        if: ${{ (env.HAS_CHANGES == 1 || env.HAS_NEW == 1) }}
        id: snapshot_sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT


  set-commit-status:
    name: Set commit status
    runs-on: ubuntu-latest
    needs: [ detect-changes, lint-scripts, lint-styles, docs, test-units, test-integrations, a11y, test-html-spec ]
    timeout-minutes: 30
    if: ${{ always() && needs.detect-changes.outputs.snapshot_sha }}

    permissions:
      statuses: write

    steps:
      - name: Set visual snapshot commit status
        uses: actions/github-script@v9
        with:
          script: |
            const results = [
              ['${{ needs.test-units.result }}', 'Status check > Unit'],
              ['${{ needs.test-integrations.result }}', 'Status check > Integration'],
              ['${{ needs.lint-scripts.result }}', 'Status check > Lint scripts'],
              ['${{ needs.lint-styles.result }}', 'Status check > Lint styles'],
              ['${{ needs.a11y.result }}', 'Status check > A11y'],
              ['${{ needs.docs.result }}', 'Status check > Docs'],
              ['${{ needs.test-html-spec.result }}', 'Status check > HTML spec'],
              // Visual status will correspond to this detect-changes job succeeding (since snapshots updated successfully)
              ['success', 'Status check > Visual']
            ];

            const mapState = (r) => {
              if (r === 'success') return 'success';
              if (r === 'cancelled' || r === 'skipped') return 'failure';
              return 'failure';
            };

            const sha = '${{ needs.detect-changes.outputs.snapshot_sha }}';
            const targetUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            await Promise.all(results.map(([result, contextName]) =>
              github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                context: contextName,
                state: mapState(result),
                target_url: targetUrl,
                description: 'Automated visual snapshot commit'
              })
            ));


  lint-scripts:
    name: Lint scripts
    uses: ./.github/workflows/_lint-scripts.yml


  lint-styles:
    name: Lint styles
    uses: ./.github/workflows/_lint-styles.yml

  a11y:
    name: A11y
    needs: [ compile-themes, render-test-pages ]
    uses: ./.github/workflows/_test-contrast.yml
    with:
      max-chunks: 4

  a11y-specs:
    name: A11y Specs
    needs: [ compile-themes ]
    uses: ./.github/workflows/_test-a11y-specs.yml

  ci-a11y-specs:
    name: Status check > A11y Specs (non-blocking)
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [ a11y-specs ]
    steps:
      - name: Report status
        run: |
          echo "A11y specs check completed (outcome: ${{ needs.a11y-specs.result }})"
          echo "This check is informational and does not block PR merging."


  docs:
    name: Docs
    needs: [ compile-themes ]
    uses: ./.github/workflows/_docs-check.yml


  test-units:
    name: Test units
    uses: ./.github/workflows/_test-units.yml


  test-integrations:
    name: Test integrations
    uses: ./.github/workflows/_test-integrations.yml


  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [ detect-changes, lint-scripts, lint-styles, docs, test-units, test-integrations, a11y, test-html-spec ]
    steps:
      - name: Evaluate results
        run: |
          echo "Results:"
          echo "  lint-scripts: ${{ needs.lint-scripts.result }}"
          echo "  lint-styles: ${{ needs.lint-styles.result }}"
          echo "  test-html-spec: ${{ needs.test-html-spec.result }}"
          echo "  test-units: ${{ needs.test-units.result }}"
          echo "  test-integrations: ${{ needs.test-integrations.result }}"
          echo "  docs: ${{ needs.docs.result }}"
          echo "  a11y: ${{ needs.a11y.result }}"
          echo "  detect-changes: ${{ needs.detect-changes.result }}"

          FAILED=0
          for result in \
            "${{ needs.lint-scripts.result }}" \
            "${{ needs.lint-styles.result }}" \
            "${{ needs.test-html-spec.result }}" \
            "${{ needs.test-units.result }}" \
            "${{ needs.test-integrations.result }}" \
            "${{ needs.docs.result }}" \
            "${{ needs.a11y.result }}" \
            "${{ needs.detect-changes.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              FAILED=1
            fi
          done

          if [[ "$FAILED" == "1" ]]; then
            echo "::error::One or more CI checks failed"
            exit 1
          fi
          echo "All checks passed!"

name: Compile themes

on:
  workflow_call:

concurrency:
  group: compile-themes-${{ github.ref }}
  cancel-in-progress: true

jobs:

  run:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Setup node
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Use cache for root node_modules
        id: cache-root-node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: root-node_modules-${{ steps.setup-node.outputs.node-version }}-${{ hashFiles('package-lock.json') }}

      - name: Install
        if: steps.cache-root-node_modules.outputs.cache-hit != 'true'
        run: |
          npm ci --no-audit --no-fund

      - name: Build test assets
        run: |
          npm run sass

      - name: Build Meridian swatches
        run: |
          npm --workspace=@progress/kendo-theme-meridian run sass:dist

      - name: Pack themes
        run: |
          tar -cf themes.tar \
            packages/core/dist/all.css \
            packages/default/dist/all.css \
            packages/bootstrap/dist/all.css \
            packages/classic/dist/all.css \
            packages/fluent/dist/all.css \
            packages/material/dist/all.css \
            packages/meridian/dist/all.css \
            packages/meridian/dist/meridian-main.css \
            packages/meridian/dist/meridian-main-dark.css \
            packages/utils/dist/all.css

      - name: Upload themes
        uses: actions/upload-artifact@v7
        with:
          name: themes
          path: themes.tar

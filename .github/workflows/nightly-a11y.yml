name: Nightly A11y Report Update

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:       # Allow manual trigger

concurrency:
  group: nightly-a11y
  cancel-in-progress: true

jobs:

  full-a11y-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:

      - name: Checkout develop
        uses: actions/checkout@v6
        with:
          ref: develop
          fetch-depth: 0

      - name: Install virtual display on Linux
        run: sudo apt-get install xvfb

      - name: Setup node
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Use cache for root node_modules
        id: cache-root-node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: root-node_modules-${{ steps.setup-node.outputs.node-version }}-${{ hashFiles('package-lock.json') }}

      - name: Install
        if: steps.cache-root-node_modules.outputs.cache-hit != 'true'
        run: npm ci --no-audit --no-fund

      - name: Compile themes
        run: npm run sass

      - name: Render test pages
        run: npm run test:render-test-pages

      - name: Build HTML package
        run: npm run build --prefix packages/html

      - name: Run full A11y tests (all components)
        id: a11y-tests
        continue-on-error: true
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0, 1366x768x24" npm run test:a11y -- --verbose

      - name: Run full contrast tests
        id: contrast-tests
        continue-on-error: true
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0, 1366x768x24" npm run test:contrast

      - name: Check for report changes
        id: check-changes
        run: |
          if git diff --quiet tests/_output/a11y-unified-report.json tests/_output/contrast-report.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No report changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Report changes detected — will open PR."
          fi

      - name: Create Pull Request with updated reports
        if: steps.check-changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/update-a11y-reports
          delete-branch: true
          title: 'chore(a11y): update a11y and contrast reports'
          commit-message: 'chore(a11y): update a11y and contrast reports [nightly]'
          body: |
            ## Nightly A11y Report Update

            This PR was automatically generated by the nightly accessibility scan.
            It updates the baseline a11y and contrast test reports.

            **A11y tests:** ${{ steps.a11y-tests.outcome }}
            **Contrast tests:** ${{ steps.contrast-tests.outcome }}

            Review the changes and merge to update the baselines used by the VPAT generator.
          add-paths: |
            tests/_output/a11y-unified-report.json
            tests/_output/contrast-report.json
          labels: |
            a11y
            automated

      - name: Summary
        run: |
          echo "## Nightly A11y Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| A11y tests | ${{ steps.a11y-tests.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Contrast tests | ${{ steps.contrast-tests.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Reports changed | ${{ steps.check-changes.outputs.changed }} |" >> $GITHUB_STEP_SUMMARY

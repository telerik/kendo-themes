name: Test integrations

on:
  workflow_call:

concurrency:
  group: test-integrations-${{ github.ref }}
  cancel-in-progress: true

jobs:

  prepare-assets:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Setup node
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Use cache for root node_modules
        id: cache-root-node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: root-node_modules-${{ steps.setup-node.outputs.node-version }}-${{ hashFiles('package-lock.json') }}

      - name: Install root dependencies
        if: steps.cache-root-node_modules.outputs.cache-hit != 'true'
        run: |
          npm ci --no-audit --no-fund

      - name: Build test assets
        run: |
          npm run sass:dist

      - name: Pack dist artifacts
        run: |
          tar -cf integration-dist.tar \
            packages/core/dist \
            packages/default/dist \
            packages/bootstrap/dist \
            packages/material/dist \
            packages/classic/dist \
            packages/fluent/dist \
            packages/meridian/dist \
            packages/utils/dist

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: integration-dist
          path: integration-dist.tar

  run:
    runs-on: ubuntu-latest
    needs: [ prepare-assets ]

    strategy:
      matrix:
        integration: [gulp, parcel, vite, webpack, esbuild]

    steps:

      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Setup node
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Use cache for root node_modules
        id: cache-root-node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: root-node_modules-${{ steps.setup-node.outputs.node-version }}-${{ hashFiles('package-lock.json') }}

      - name: Install root dependencies
        if: steps.cache-root-node_modules.outputs.cache-hit != 'true'
        run: |
          npm ci --no-audit --no-fund

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: integration-dist

      - name: Unpack dist artifacts
        run: tar -xf integration-dist.tar

      - name: Use cache for integration node_modules
        id: cache-integration-node_modules
        uses: actions/cache@v5
        with:
          path: integrations/${{ matrix.integration }}/node_modules
          key: integration-${{ matrix.integration }}-node_modules-${{ steps.setup-node.outputs.node-version }}-${{ hashFiles('integrations/${{ matrix.integration }}/package-lock.json') }}

      - name: Install integration dependencies
        if: steps.cache-integration-node_modules.outputs.cache-hit != 'true'
        run: |
          npm run install:${{ matrix.integration }} --prefix integrations

      - name: Test integration
        run: |
          npm run build:${{ matrix.integration }} --prefix integrations
